<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Teste GitHub WebGL</title>
<style>
body {
  margin: 0;
  background: radial-gradient(circle, #02040a, #000);
  overflow: hidden;
}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  1000
);

camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💠 luz simples
const light = new THREE.PointLight(0x00f6ff, 2);
light.position.set(2, 2, 2);
scene.add(light);

// 🔷 forma holográfica feminina simplificada (garantido visível)
const body = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.7, 2.0, 8, 16),
  new THREE.MeshBasicMaterial({
    color: 0x00f6ff,
    wireframe: true,
    transparent: true,
    opacity: 0.5
  })
);

scene.add(body);

// ✨ partículas
const geo = new THREE.BufferGeometry();
const pos = [];

for (let i = 0; i < 500; i++) {
  pos.push(
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 6
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));

const particles = new THREE.Points(
  geo,
  new THREE.PointsMaterial({
    color: 0x00f6ff,
    size: 0.04
  })
);

scene.add(particles);

// 🌊 loop
function animate() {
  requestAnimationFrame(animate);

  body.rotation.y += 0.01;
  particles.rotation.y += 0.002;

  body.position.y = Math.sin(Date.now() * 0.001) * 0.2;

  renderer.render(scene, camera);
}

animate();

// 📱 resize
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
