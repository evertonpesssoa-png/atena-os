<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Goétia de Salomão - Selo Místico 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cinema', 'Courier New', monospace;
        }
        
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ffcc88;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            letter-spacing: 1px;
            border-left: 3px solid #d4af37;
            font-family: monospace;
        }
        
        #title {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #e6c87e;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            font-family: 'Georgia', serif;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.5);
            z-index: 10;
        }
        
        .controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; text-shadow: 0 0 0px #d4af37; }
            100% { opacity: 1; text-shadow: 0 0 8px #d4af37; }
        }
        
        #title span {
            animation: pulse 2s infinite alternate;
        }
    </style>
</head>
<body>
    <div id="title">
        ⚝ SELO DA GOÉTIA - REI PAIMON ⚝
    </div>
    <div id="info">
        ✦ Círculo de proteção ✦ Sigilo ancestral ✦ Chamas do Abismo ✦
    </div>
    <div class="controls-note">
        🖱️ Arraste para rotacionar | Scroll para zoom
    </div>

    <!-- Importação das bibliotecas necessárias -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup da cena, câmera, renderizador ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // névoa sutil
        
        // Câmera perspective
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // --- Efeitos de pós-processamento (Bloom para brilho mágico) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.9;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- Controles de órbita para interação ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.zoomSpeed = 1.0;
        controls.target.set(0, 0, 0);
        
        // --- Luzes ---
        // Luz ambiente suave
        const ambientLight = new THREE.AmbientLight(0x221c3a);
        scene.add(ambientLight);
        
        // Luz principal direcional com tom dourado
        const mainLight = new THREE.DirectionalLight(0xd4b87a, 1.2);
        mainLight.position.set(2, 5, 3);
        scene.add(mainLight);
        
        // Luz de preenchimento traseira azulada para contraste mágico
        const backLight = new THREE.PointLight(0x3a2e6a, 0.8);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        
        // Luz lateral quente
        const warmFill = new THREE.PointLight(0xc97e3a, 0.6);
        warmFill.position.set(1.5, 1.2, 2);
        scene.add(warmFill);
        
        // Luz dinâmica pulsante no centro
        const coreLight = new THREE.PointLight(0xff6633, 0.9, 8);
        coreLight.position.set(0, 0.2, 0);
        scene.add(coreLight);
        
        // Chamas de partículas - sistema de fagulhas ao redor
        const particleCount = 1200;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            // Distribuição em anel esférico irregular com raio entre 1.3 e 2.4
            const radius = 1.5 + Math.random() * 1.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            particlePositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            particlePositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.6; // achatamento vertical
            particlePositions[i*3+2] = radius * Math.cos(phi);
            
            // Cores: laranja, dourado, vermelho e roxo
            const colorChoice = Math.random();
            if (colorChoice < 0.6) {
                particleColors[i*3] = 1.0;     // R
                particleColors[i*3+1] = 0.5 + Math.random()*0.4; // G
                particleColors[i*3+2] = 0.2 + Math.random()*0.3; // B
            } else if (colorChoice < 0.85) {
                particleColors[i*3] = 0.8;
                particleColors[i*3+1] = 0.3;
                particleColors[i*3+2] = 0.7;
            } else {
                particleColors[i*3] = 0.4;
                particleColors[i*3+1] = 0.2;
                particleColors[i*3+2] = 0.9;
            }
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({ size: 0.035, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.7 });
        const particleSystem = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particleSystem);
        
        // --- Elementos do Selo Principal ---
        const seloGroup = new THREE.Group();
        
        // 1. Anel externo (círculo de proteção) - com textura dourada e detalhes runicos simulados
        const outerRingGeometry = new THREE.TorusGeometry(1.65, 0.045, 128, 200);
        const goldMaterial = new THREE.MeshStandardMaterial({ color: 0xd4af37, emissive: 0x442200, metalness: 0.85, roughness: 0.3, emissiveIntensity: 0.4 });
        const outerRing = new THREE.Mesh(outerRingGeometry, goldMaterial);
        seloGroup.add(outerRing);
        
        // Segundo anel interno mais fino
        const innerRingGeo = new THREE.TorusGeometry(1.42, 0.028, 128, 200);
        const innerRing = new THREE.Mesh(innerRingGeo, new THREE.MeshStandardMaterial({ color: 0xbd9e3a, metalness: 0.7, roughness: 0.4, emissive: 0x331c00, emissiveIntensity: 0.2 }));
        seloGroup.add(innerRing);
        
        // 2. Círculo central com sigilo desenhado via textura Canvas
        const createSigilTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Fundo transparente com glow
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Configuração estilo pergaminho escuro
            ctx.fillStyle = 'rgba(10, 8, 20, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Bordas douradas do círculo interior
            ctx.strokeStyle = '#e4b453';
            ctx.lineWidth = 18;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width*0.42, 0, Math.PI*2);
            ctx.stroke();
            
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width*0.36, 0, Math.PI*2);
            ctx.stroke();
            
            // Símbolos e sigilos da Goétia - inspirado no selo do Rei Paimon
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.strokeStyle = '#c9a03d';
            ctx.fillStyle = '#b8862c';
            ctx.lineWidth = 14;
            ctx.shadowBlur = 0;
            
            // Hexagrama central
            const radiusHex = canvas.width * 0.28;
            for (let i = 0; i < 6; i++) {
                const angle = (i * 60) * Math.PI / 180;
                const x1 = Math.cos(angle) * radiusHex;
                const y1 = Math.sin(angle) * radiusHex;
                const angle2 = ((i+2) * 60) * Math.PI / 180;
                const x2 = Math.cos(angle2) * radiusHex;
                const y2 = Math.sin(angle2) * radiusHex;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // Círculo interno com pentagrama
            ctx.beginPath();
            ctx.arc(0, 0, radiusHex * 0.75, 0, Math.PI*2);
            ctx.stroke();
            
            // Pentagrama
            const points = 5;
            const outerR = radiusHex * 0.68;
            for (let i = 0; i < points; i++) {
                const angle = (i * 72 - 18) * Math.PI/180;
                const x1 = Math.cos(angle) * outerR;
                const y1 = Math.sin(angle) * outerR;
                const angleNext = ((i+2) * 72 - 18) * Math.PI/180;
                const x2 = Math.cos(angleNext) * outerR;
                const y2 = Math.sin(angleNext) * outerR;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // Glifos ao redor (círculo de caracteres)
            ctx.font = `bold ${Math.floor(canvas.width * 0.07)}px "Segoe UI Symbol", "Arial Unicode MS", serif`;
            ctx.fillStyle = '#e8bf6e';
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#ffaa33";
            const runes = ["⚝", "✧", "꧁", "꧂", "⛧", "☥", "⨀", "☉", "⛤", "✹", "🜍", "🝆"];
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30) * Math.PI/180;
                const r = canvas.width * 0.38;
                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI/2);
                ctx.fillText(runes[i % runes.length], -15, 15);
                ctx.restore();
            }
            
            // inscrição latina/cabala fictícia
            ctx.font = `24px "Courier New", monospace`;
            ctx.fillStyle = "#cda45e";
            ctx.fillText("AGLA • ON • BREATH • TETRAGRAMMATON", -280, -360);
            ctx.fillText("⚝ SAPIENTIA • FORTITUDO • DECANUS ⚝", -270, 380);
            
            // símbolos de selo menor
            ctx.font = `36px "Times New Roman"`;
            ctx.fillStyle = "#dba642";
            for (let i = 0; i < 8; i++) {
                const angle = (i * 45) * Math.PI/180;
                const r = canvas.width * 0.31;
                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r;
                ctx.fillText("⛧", x-12, y+12);
            }
            
            ctx.restore();
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        };
        
        const sigilTexture = createSigilTexture();
        const sigilPlaneMat = new THREE.MeshStandardMaterial({ map: sigilTexture, side: THREE.DoubleSide, emissive: 0x352010, emissiveIntensity: 0.4, metalness: 0.2, roughness: 0.5, transparent: true });
        const sigilPlane = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), sigilPlaneMat);
        sigilPlane.rotation.x = -0.05;
        sigilPlane.position.z = 0.02;
        seloGroup.add(sigilPlane);
        
        // --- Os 3 pontos de luz flutuante (velas/espíritos) ---
        const candleGroup = new THREE.Group();
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff3311, emissiveIntensity: 0.7, metalness: 0.1 });
        const positions = [[1.2, 0.4, 0.9], [-1.0, 0.5, -1.1], [0.3, 1.1, -1.3], [-1.3, -0.2, 0.8]];
        positions.forEach(pos => {
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), sphereMat);
            orb.position.set(pos[0], pos[1], pos[2]);
            candleGroup.add(orb);
            
            // glow effect com ponto de luz
            const glowLight = new THREE.PointLight(0xff6633, 0.5, 4);
            glowLight.position.set(pos[0], pos[1], pos[2]);
            candleGroup.add(glowLight);
        });
        seloGroup.add(candleGroup);
        
        // --- Estrelas de Davi / hexagramas suspensos ---
        const starGroup = new THREE.Group();
        const starMaterial = new THREE.MeshStandardMaterial({ color: 0xdcb570, emissive: 0x442200, metalness: 0.75 });
        for (let i = 0; i < 6; i++) {
            const angleStar = (i * 60) * Math.PI/180;
            const radiusStar = 1.85;
            const xPos = Math.cos(angleStar) * radiusStar;
            const zPos = Math.sin(angleStar) * radiusStar;
            const starMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.12, 6), starMaterial);
            starMesh.position.set(xPos, 0.15, zPos);
            starGroup.add(starMesh);
        }
        seloGroup.add(starGroup);
        
        // Anel externo com runas 3D pequenas - argolas decorativas
        const runeRingGroup = new THREE.Group();
        const runeSpheres = [];
        for (let i = 0; i < 72; i++) {
            const angle = (i / 72) * Math.PI * 2;
            const radiusRun = 1.78;
            const smallSphere = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), new THREE.MeshStandardMaterial({ color: 0xd4af37, emissive: 0x552200, emissiveIntensity: 0.3 }));
            smallSphere.position.set(Math.cos(angle) * radiusRun, Math.sin(angle) * 0.08, Math.sin(angle) * radiusRun);
            runeRingGroup.add(smallSphere);
            runeSpheres.push(smallSphere);
        }
        seloGroup.add(runeRingGroup);
        
        // Adicionar um chão circular translúcido com glow
        const floorGlowMat = new THREE.MeshStandardMaterial({ color: 0x1e1335, emissive: 0x331a44, emissiveIntensity: 0.25, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
        const glowDisc = new THREE.Mesh(new THREE.CircleGeometry(2.3, 16), floorGlowMat);
        glowDisc.rotation.x = -Math.PI / 2;
        glowDisc.position.y = -0.2;
        seloGroup.add(glowDisc);
        
        scene.add(seloGroup);
        
        // --- Adicionar partículas extras flutuantes (fumaça mágica) ---
        const smokeParticleCount = 800;
        const smokeGeo = new THREE.BufferGeometry();
        const smokePositions = new Float32Array(smokeParticleCount * 3);
        for (let i = 0; i < smokeParticleCount; i++) {
            smokePositions[i*3] = (Math.random() - 0.5) * 5.5;
            smokePositions[i*3+1] = Math.random() * 2.2;
            smokePositions[i*3+2] = (Math.random() - 0.5) * 5;
        }
        smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePositions, 3));
        const smokeMat = new THREE.PointsMaterial({ color: 0x9977aa, size: 0.012, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
        const smokeSys = new THREE.Points(smokeGeo, smokeMat);
        scene.add(smokeSys);
        
        // --- Eixo de energia vertical - linhas de luz (opcional) ---
        const beamGroup = new THREE.Group();
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffaa55 });
        for (let i = 0; i < 36; i++) {
            const ang = (i / 36) * Math.PI * 2;
            const rad = 1.55;
            const start = new THREE.Vector3(Math.cos(ang) * rad, -0.3, Math.sin(ang) * rad);
            const end = new THREE.Vector3(Math.cos(ang) * rad, 0.65, Math.sin(ang) * rad);
            const pointsArr = [start, end];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(pointsArr);
            const lineObj = new THREE.Line(lineGeo, lineMat);
            beamGroup.add(lineObj);
        }
        scene.add(beamGroup);
        
        // --- Animações ---
        let time = 0;
        
        // Animação das partículas flutuantes e rotação
        const animate = () => {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Movimento das partículas ao redor do selo
            particleSystem.rotation.y = time * 0.15;
            particleSystem.rotation.x = Math.sin(time * 0.23) * 0.1;
            particleSystem.rotation.z = Math.cos(time * 0.19) * 0.05;
            
            // Fumaça sobe levemente
            smokeSys.rotation.y += 0.002;
            smokeSys.rotation.x = Math.sin(time * 0.1) * 0.05;
            
            // Pulsação da luz central
            const intensityPulse = 0.7 + Math.sin(time * 3.5) * 0.35;
            coreLight.intensity = intensityPulse;
            
            // Pequeno movimento nos orbes flutuantes
            candleGroup.children.forEach((child, idx) => {
                if (child.isMesh) {
                    child.position.y += Math.sin(time * 3 + idx) * 0.003;
                }
                if (child.isPointLight) {
                    child.intensity = 0.45 + Math.sin(time * 4 + idx) * 0.2;
                }
            });
            
            // Brilho das runas (pequenos pulsos)
            runeSpheres.forEach((sphere, idx) => {
                const mat = sphere.material;
                if (mat) {
                    const pulse = 0.3 + Math.sin(time * 3.2 + idx) * 0.2;
                    mat.emissiveIntensity = pulse;
                }
            });
            
            // Rotação lenta do selo principal e grupo de runas
            seloGroup.rotation.y = Math.sin(time * 0.1) * 0.12;
            seloGroup.rotation.x = Math.sin(time * 0.2) * 0.03;
            starGroup.rotation.y = time * 0.2;
            beamGroup.rotation.y = time * 0.08;
            
            // Autoroatação da câmera se não houver interação recente? O OrbitControls tem autoRotate, já ativado
            controls.update();
            
            // Atualizar textura do sigilo periodicamente para animar? Não necessário, mas pode recriar se quiser efeito cintilante
            
            // Render via EffectComposer
            effectComposer.render();
        };
        
        // Iniciar animação
        animate();
        
        // Ajustar redimensionamento da janela
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Pequeno toque: console mágico
        console.log('%c⚝ Selo da Goétia de Salomão invocado ⚝', 'color: #d4af37; font-size: 16px; font-family: monospace;');
        
        // Adicionar um piso de luz circular sutil (efeito de chão)
        const circleFloorMat = new THREE.MeshStandardMaterial({ color: 0x1c102e, emissive: 0x341f50, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.3 });
        const ritualCircle = new THREE.Mesh(new THREE.RingGeometry(2.0, 2.45, 64), circleFloorMat);
        ritualCircle.rotation.x = -Math.PI / 2;
        ritualCircle.position.y = -0.25;
        scene.add(ritualCircle);
        
        // Pequenos tetraedros flutuantes (espíritos menores)
        const spiritGroup = new THREE.Group();
        const spiritMat = new THREE.MeshStandardMaterial({ color: 0xa97ac9, emissive: 0x662266, emissiveIntensity: 0.5 });
        for (let i = 0; i < 12; i++) {
            const tetraGeo = new THREE.ConeGeometry(0.055, 0.11, 4);
            const tetra = new THREE.Mesh(tetraGeo, spiritMat);
            const angleSpirit = (i / 12) * Math.PI * 2;
            const radSpirit = 1.95;
            tetra.position.set(Math.cos(angleSpirit) * radSpirit, 0.25 + Math.sin(angleSpirit*2)*0.1, Math.sin(angleSpirit) * radSpirit);
            spiritGroup.add(tetra);
        }
        scene.add(spiritGroup);
        
        // Animar espíritos
        function animateSpirits() {
            requestAnimationFrame(animateSpirits);
            spiritGroup.rotation.y += 0.008;
            spiritGroup.children.forEach((child, idx) => {
                child.position.y = 0.22 + Math.sin(Date.now() * 0.002 + idx) * 0.05;
            });
        }
        animateSpirits();
        
    </script>
</body>
</html>
