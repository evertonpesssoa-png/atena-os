<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma • Projeção Arcana</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">✨ HOLOGRAMA • PROJEÇÃO ARCANO ✨</div>
    <div class="controls">🖱️ Arraste para rotacionar | Scroll para zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // =========================
        // CENA
        // =========================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.02);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 3.5);
        camera.lookAt(0, 1.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // =========================
        // EFEITO BLOOM (GLOW)
        // =========================
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // =========================
        // CONTROLES
        // =========================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 1.2, 0);
        
        // =========================
        // PARTÍCULAS DE FUNDO (ESTRELAS)
        // =========================
        const starCount = 2000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 40;
            starPositions[i*3+1] = (Math.random() - 0.5) * 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 30 - 15;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0x44aaff, size: 0.04, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // =========================
        // HOLOGRAMA - SILHUETA FEMININA COM PARTÍCULAS
        // =========================
        const hologramGroup = new THREE.Group();
        
        // Efeito de "névoa" ao redor (esfera transparente)
        const auraGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.1, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x44aaff, emissiveIntensity: 0.3, transparent: true, opacity: 0.08, wireframe: true })
        );
        auraGlow.position.y = 0.9;
        hologramGroup.add(auraGlow);
        
        // CORPO (silhueta translúcida)
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x3388ff, emissiveIntensity: 0.4, transparent: true, opacity: 0.35 });
        
        // Tronco
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.38, 0.9, 12), bodyMat);
        torso.position.y = 0.45;
        hologramGroup.add(torso);
        
        // Cintura/vestido
        const skirt = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.65, 0.5, 8), bodyMat);
        skirt.position.y = 0.1;
        hologramGroup.add(skirt);
        
        // Cabeça
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, emissive: 0xffaa88, emissiveIntensity: 0.2, transparent: true, opacity: 0.7 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), headMat);
        head.position.y = 0.95;
        hologramGroup.add(head);
        
        // CABELO (estilo fluído, várias camadas)
        const hairMat = new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xff44aa, emissiveIntensity: 0.3, transparent: true, opacity: 0.6 });
        
        // Cabelo traseiro
        const backHair = new THREE.Mesh(new THREE.SphereGeometry(0.31, 16, 16), hairMat);
        backHair.position.y = 0.96;
        backHair.scale.set(1.0, 0.7, 0.6);
        hologramGroup.add(backHair);
        
        // Franja
        const fringe = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.12, 0.18), hairMat);
        fringe.position.set(0, 1.04, 0.29);
        hologramGroup.add(fringe);
        
        // Laterais do cabelo
        const leftHair = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.45, 6), hairMat);
        leftHair.position.set(-0.32, 0.9, 0.05);
        leftHair.rotation.z = 0.3;
        hologramGroup.add(leftHair);
        
        const rightHair = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.45, 6), hairMat);
        rightHair.position.set(0.32, 0.9, 0.05);
        rightHair.rotation.z = -0.3;
        hologramGroup.add(rightHair);
        
        // Topo do cabelo (volume)
        const topHair = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.28, 8), hairMat);
        topHair.position.y = 1.12;
        hologramGroup.add(topHair);
        
        // OLHOS (brilhantes)
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x44ddff, emissive: 0x44aaff, emissiveIntensity: 0.8 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), eyeMat);
        leftEye.position.set(-0.11, 1.02, 0.31);
        hologramGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), eyeMat);
        rightEye.position.set(0.11, 1.02, 0.31);
        hologramGroup.add(rightEye);
        
        // Pupilas (mais brilhantes)
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88ddff, emissiveIntensity: 0.5 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.035, 16, 16), pupilMat);
        leftPupil.position.set(-0.11, 1.01, 0.37);
        hologramGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.035, 16, 16), pupilMat);
        rightPupil.position.set(0.11, 1.01, 0.37);
        hologramGroup.add(rightPupil);
        
        // BOCA (curva de luz)
        const mouthGeo = new THREE.TorusGeometry(0.07, 0.012, 8, 20, Math.PI);
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0xff6688, emissiveIntensity: 0.4 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.rotation.x = 0.15;
        mouth.position.set(0, 0.86, 0.34);
        hologramGroup.add(mouth);
        
        // BRAÇOS
        const armMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, transparent: true, opacity: 0.6 });
        
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.6, 6), armMat);
        leftArm.position.set(-0.48, 0.7, 0);
        leftArm.rotation.z = 0.35;
        leftArm.rotation.x = -0.2;
        hologramGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.6, 6), armMat);
        rightArm.position.set(0.48, 0.7, 0);
        rightArm.rotation.z = -0.35;
        rightArm.rotation.x = 0.2;
        hologramGroup.add(rightArm);
        
        // MÃOS (partículas de luz)
        const handMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, emissive: 0xffaa88, emissiveIntensity: 0.3 });
        const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), handMat);
        leftHand.position.set(-0.73, 0.42, 0.08);
        hologramGroup.add(leftHand);
        
        const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), handMat);
        rightHand.position.set(0.73, 0.42, -0.08);
        hologramGroup.add(rightHand);
        
        scene.add(hologramGroup);
        
        // =========================
        // PARTÍCULAS FLUTUANTES (EM VOLTA DO HOLOGRAMA)
        // =========================
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.9 + Math.random() * 0.8;
            const y = Math.random() * 1.8;
            particlePos[i*3] = Math.cos(angle) * radius;
            particlePos[i*3+1] = y;
            particlePos[i*3+2] = Math.sin(angle) * radius;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x66ccff, size: 0.02, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const floatingParticles = new THREE.Points(particleGeo, particleMat);
        scene.add(floatingParticles);
        
        // =========================
        // ANEL HOLOGRÁFICO (BASE)
        // =========================
        const ringGeo = new THREE.TorusGeometry(0.85, 0.025, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x44aaff, emissiveIntensity: 0.7, transparent: true, opacity: 0.8 });
        const baseRing = new THREE.Mesh(ringGeo, ringMat);
        baseRing.rotation.x = Math.PI / 2;
        baseRing.position.y = -0.15;
        scene.add(baseRing);
        
        const ring2 = new THREE.Mesh(ringGeo, ringMat);
        ring2.scale.set(1.15, 1.15, 1.15);
        ring2.rotation.x = Math.PI / 2 + 0.2;
        ring2.position.y = -0.1;
        scene.add(ring2);
        
        // =========================
        // SCANLINES (OVERLAY)
        // =========================
        const scanlineOverlay = document.createElement('div');
        scanlineOverlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 200, 0.04) 0px, rgba(0, 255, 200, 0.04) 2px, transparent 2px, transparent 4px);
            z-index: 1000;
        `;
        document.body.appendChild(scanlineOverlay);
        
        // Vignette
        const vignette = document.createElement('div');
        vignette.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7) 100%);
            z-index: 999;
        `;
        document.body.appendChild(vignette);
        
        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.015;
            
            // Flutuação do holograma
            hologramGroup.position.y = Math.sin(time * 1.2) * 0.02;
            
            // Piscar dos olhos
            const blink = Math.sin(time * 1.8) > 0.98;
            if (blink) {
                leftPupil.scale.set(1, 0.1, 1);
                rightPupil.scale.set(1, 0.1, 1);
            } else {
                leftPupil.scale.set(1, 1, 1);
                rightPupil.scale.set(1, 1, 1);
            }
            
            // Rotação dos anéis
            baseRing.rotation.z = time * 0.5;
            ring2.rotation.z = -time * 0.4;
            
            // Partículas flutuantes girando
            floatingParticles.rotation.y = time * 0.3;
            floatingParticles.rotation.x = Math.sin(time * 0.5) * 0.1;
            
            // Estrelas girando lentamente
            stars.rotation.y = time * 0.02;
            
            // Aura pulsante
            const pulse = 0.25 + Math.sin(time * 3) * 0.1;
            auraGlow.material.emissiveIntensity = pulse;
            
            controls.update();
            effectComposer.render();
        }
        
        animate();
        
        // =========================
        // RESIZE
        // =========================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✨ HOLOGRAMA carregado! ✨');
    </script>
</body>
</html>
