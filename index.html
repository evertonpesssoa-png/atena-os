<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Holograma Feminino Real</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #02040a, #000);
}

canvas { display: block; }

.label {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00f6ff;
  font-family: Arial;
  letter-spacing: 3px;
  opacity: 0.7;
  text-shadow: 0 0 10px #00f6ff;
}
</style>
</head>

<body>
<div class="label">ENTIDADE HOLOGRÁFICA FEMININA</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 luz holográfica
const light = new THREE.PointLight(0x00f6ff, 2);
light.position.set(3, 5, 3);
scene.add(light);

// 🌊 loader do modelo feminino
const loader = new THREE.GLTFLoader();

// 👉 modelo público base (você pode trocar depois)
loader.load(
  "https://models.readyplayer.me/64f1f4c6a3b7c3b6f7d9b8f1.glb",

  function (gltf) {
    const model = gltf.scene;

    model.scale.set(1.5, 1.5, 1.5);
    model.position.y = -1;

    // 💠 efeito holograma
    model.traverse((child) => {
      if (child.isMesh) {
        child.material.transparent = true;
        child.material.opacity = 0.5;
        child.material.color.set(0x00f6ff);
        child.material.wireframe = true;
      }
    });

    scene.add(model);

    // 🌊 animação viva
    function animate() {
      requestAnimationFrame(animate);

      const t = Date.now() * 0.001;

      model.rotation.y += 0.003;
      model.position.y = -1 + Math.sin(t) * 0.1;

      renderer.render(scene, camera);
    }

    animate();
  }
);

// 📱 resize
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
