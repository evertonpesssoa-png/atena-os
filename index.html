<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Holograma Feminino Funcional</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #02040a, #000);
}

canvas { display: block; }

.text {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00f6ff;
  font-family: Arial;
  letter-spacing: 3px;
  opacity: 0.7;
  text-shadow: 0 0 10px #00f6ff;
}
</style>
</head>

<body>
<div class="text">HOLOGRAMA FEMININO (FIX)</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  innerWidth / innerHeight,
  0.1,
  1000
);

camera.position.set(0, 1.2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 luz holográfica
const light = new THREE.PointLight(0x00f6ff, 2);
light.position.set(3, 3, 3);
scene.add(light);

// 💠 corpo feminino estilizado (proporção humana melhor)
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6, 0.9, 2.2, 16),
  new THREE.MeshBasicMaterial({
    color: 0x00f6ff,
    wireframe: true,
    transparent: true,
    opacity: 0.35
  })
);

const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 16, 16),
  new THREE.MeshBasicMaterial({
    color: 0x00f6ff,
    wireframe: true,
    transparent: true,
    opacity: 0.4
  })
);

const hips = new THREE.Mesh(
  new THREE.CylinderGeometry(0.7, 0.5, 1.5, 16),
  torso.material
);

head.position.y = 2.2;
torso.position.y = 0;
hips.position.y = -1.6;

scene.add(head);
scene.add(torso);
scene.add(hips);

// ✨ partículas holográficas
const particlesGeo = new THREE.BufferGeometry();
const count = 400;
const pos = [];

for (let i = 0; i < count; i++) {
  pos.push(
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 6
  );
}

particlesGeo.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(pos, 3)
);

const particles = new THREE.Points(
  particlesGeo,
  new THREE.PointsMaterial({
    color: 0x00f6ff,
    size: 0.03,
    transparent: true,
    opacity: 0.6
  })
);

scene.add(particles);

// 🌊 animação viva
function animate() {
  requestAnimationFrame(animate);

  const t = Date.now() * 0.001;

  head.position.y = 2.2 + Math.sin(t) * 0.05;
  torso.scale.y = 1 + Math.sin(t) * 0.03;

  head.rotation.y += 0.002;
  torso.rotation.y += 0.002;
  hips.rotation.y += 0.002;

  particles.rotation.y += 0.001;

  renderer.render(scene, camera);
}

animate();

// 📱 resize
addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
