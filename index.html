<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma - Atena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            overflow: hidden;
            font-family: monospace;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Console visual */
        #console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-size: 10px;
            padding: 6px;
            border-top: 1px solid #0f0;
            z-index: 9999;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            pointer-events: none;
        }
        
        .console-line {
            border-bottom: 1px solid #333;
            padding: 2px 0;
        }
        
        .error { color: #f00; }
        .success { color: #0f0; }
        .info { color: #0ff; }
        
        /* Instruções */
        #instructions {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #aaa;
            font-size: 10px;
            padding: 6px 10px;
            border-radius: 8px;
            z-index: 9999;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        🖱️ Use um dedo para girar<br>
        ✌️ Dois dedos para zoom
    </div>
    <div id="console"></div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ======================
        // CONSOLE VISUAL
        // ======================
        const consoleDiv = document.getElementById('console');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `console-line ${type}`;
            div.textContent = new Date().toLocaleTimeString().slice(0,8) + ' | ' + msg;
            consoleDiv.appendChild(div);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(msg);
        }
        
        log('🚀 Holograma iniciado!', 'success');
        
        // ======================
        // CENA
        // ======================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.003);
        log('✅ Cena criada');
        
        // ======================
        // CÂMERA
        // ======================
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 4.5);
        log('✅ Câmera posicionada');
        
        // ======================
        // RENDERER
        // ======================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        log('✅ Renderer criado');
        
        // ======================
        // CONTROLES (navegação com dedo/mouse)
        // ======================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1, 0);
        log('✅ Controles ativados - use o dedo para navegar!', 'success');
        
        // ======================
        // GRADE DE REFERÊNCIA
        // ======================
        const gridHelper = new THREE.GridHelper(8, 20, 0x2266aa, 0x114466);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        // ======================
        // LUZES (para dar brilho extra)
        // ======================
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        const backLight = new THREE.PointLight(0x2266ff, 0.5);
        backLight.position.set(0, 1.5, -2);
        scene.add(backLight);
        
        // ======================
        // CARREGAR IMAGEM E CRIAR HOLOGRAMA
        // ======================
        log('📷 Carregando atena.png...');
        
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = "./atena.png";
        
        img.onload = () => {
            log(`✅ Imagem carregada: ${img.width}x${img.height}`, 'success');
            
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;
            
            const positions = [];
            const step = 3;  // ← AJUSTE: 2=detalhado, 3=balanceado, 4=espaçado
            
            for (let y = 0; y < img.height; y += step) {
                for (let x = 0; x < img.width; x += step) {
                    const index = (y * img.width + x) * 4;
                    const r = data[index];
                    const g = data[index+1];
                    const b = data[index+2];
                    const brightness = r + g + b;
                    
                    // Só pega pixels claros (ignora fundo escuro)
                    if (brightness > 80) {
                        const px = (x / img.width) * 4.5 - 2.25;
                        const py = 2.2 - (y / img.height) * 3.8;
                        const pz = (Math.random() - 0.5) * 0.35;
                        positions.push(px, py, pz);
                    }
                }
            }
            
            log(`✨ ${(positions.length / 3).toLocaleString()} pontos gerados`, 'success');
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x3399ff,
                size: 0.055,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            const hologram = new THREE.Points(geometry, material);
            scene.add(hologram);
            
            log('✅ Holograma criado! Use o dedo para girar e dar zoom', 'success');
            
            // ======================
            // PARTÍCULAS FLUTUANTES
            // ======================
            const floatingCount = 1200;
            const floatingPos = [];
            for (let i = 0; i < floatingCount; i++) {
                floatingPos.push((Math.random() - 0.5) * 7);
                floatingPos.push((Math.random() - 0.5) * 4 + 0.5);
                floatingPos.push((Math.random() - 0.5) * 5);
            }
            const floatingGeo = new THREE.BufferGeometry();
            floatingGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(floatingPos), 3));
            const floatingMat = new THREE.PointsMaterial({
                color: 0x66ccff,
                size: 0.025,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            const floatingPoints = new THREE.Points(floatingGeo, floatingMat);
            scene.add(floatingPoints);
            log('✨ Partículas flutuantes adicionadas', 'success');
            
            // ======================
            // ANIMAÇÃO
            // ======================
            let time = 0;
            
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;
                
                hologram.rotation.y = Math.sin(time * 0.15) * 0.1;
                hologram.position.y = Math.sin(time * 0.8) * 0.02;
                
                floatingPoints.rotation.y += 0.0015;
                floatingPoints.rotation.x = Math.sin(time * 0.1) * 0.05;
                
                controls.update();
                renderer.render(scene, camera);
            }
            
            animate();
            log('🎬 Animação rodando!', 'success');
        };
        
        img.onerror = () => {
            log('❌ ERRO: Imagem atena.png não encontrada!', 'error');
            log('📁 Verifique se o arquivo está na mesma pasta que este HTML', 'error');
        };
        
        // ======================
        // AJUSTAR TAMANHO DA TELA
        // ======================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            log('📱 Tela redimensionada');
        });
        
        log('📝 Aguardando imagem...');
    </script>
</body>
</html>
