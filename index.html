<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCI-FI HUD - GRÁFICOS INTERATIVOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* HUD Header */
        .hud-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            border-bottom: 2px solid #00ffff;
            position: relative;
        }

        .hud-header h1 {
            color: #00ffff;
            font-size: clamp(18px, 5vw, 28px);
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ffff;
        }

        .hud-header p {
            color: #88aaff;
            font-size: clamp(10px, 3vw, 12px);
            letter-spacing: 2px;
        }

        /* Grid responsivo */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-full {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Cards HUD */
        .hud-card {
            background: rgba(0, 10, 20, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.3s ease;
            position: relative;
        }

        .hud-card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title {
            color: #00ffff;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Legendas interativas */
        .chart-legend {
            display: flex;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 10px;
        }

        .legend-item:hover {
            background: rgba(0, 255, 255, 0.1);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-text {
            color: #88aaff;
        }

        .legend-item.hidden .legend-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* Container do gráfico */
        .chart-container {
            position: relative;
            width: 100%;
            height: 280px;
            cursor: crosshair;
        }

        /* Tooltip customizado */
        .custom-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 10px 15px;
            font-family: monospace;
            font-size: 11px;
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: all 0.05s ease;
        }

        .custom-tooltip .tooltip-title {
            color: #00ffff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .custom-tooltip .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 3px 0;
        }

        .custom-tooltip .tooltip-label {
            color: #88aaff;
        }

        .custom-tooltip .tooltip-value {
            color: #ff44ff;
            font-weight: bold;
        }

        /* Crosshair interativo */
        .crosshair-v {
            position: fixed;
            width: 1px;
            background: rgba(0, 255, 255, 0.5);
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 0 4px #00ffff;
        }

        .crosshair-h {
            position: fixed;
            height: 1px;
            background: rgba(0, 255, 255, 0.5);
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 0 4px #00ffff;
        }

        /* Valores em tempo real */
        .live-values {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 10px;
        }

        .live-card {
            flex: 1;
            text-align: center;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 6px;
            padding: 8px;
        }

        .live-card .label {
            color: #88aaff;
            font-size: 9px;
        }

        .live-card .value {
            color: #00ffff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffff;
        }

        /* Botões de zoom */
        .chart-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .chart-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-family: monospace;
            transition: all 0.2s;
        }

        .chart-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 8px #00ffff;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .hud-card { padding: 12px; }
            .chart-container { height: 220px; }
            .grid-2 { grid-template-columns: 1fr; }
            .live-card .value { font-size: 14px; }
            .chart-legend { justify-content: center; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; background: #010105; }
        ::-webkit-scrollbar-track { background: #0a0a1a; }
        ::-webkit-scrollbar-thumb { background: #00ffff; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="hud-header">
            <h1>✦ INTERACTIVE HOLOGRAPHIC DASHBOARD ✦</h1>
            <p>SISTEMA DE MONITORAMENTO | CLIQUE NAS LEGENDAS | PASSE O MOUSE SOBRE OS GRÁFICOS</p>
        </div>

        <!-- GRÁFICO 1: Velocidade com zoom interativo -->
        <div class="grid-2">
            <div class="hud-card">
                <div class="card-header">
                    <span class="card-title">📈 VELOCIDADE x TEMPO</span>
                    <div class="chart-legend" id="speedLegend"></div>
                </div>
                <div class="chart-container">
                    <canvas id="speedChart"></canvas>
                </div>
                <div class="chart-controls">
                    <button class="chart-btn" onclick="zoomIn('speed')">🔍 ZOOM IN</button>
                    <button class="chart-btn" onclick="zoomOut('speed')">🔍 ZOOM OUT</button>
                    <button class="chart-btn" onclick="resetZoom('speed')">⟳ RESET</button>
                </div>
                <div class="live-values" id="speedLive"></div>
            </div>

            <!-- GRÁFICO 2: Múltiplas métricas com toggle -->
            <div class="hud-card">
                <div class="card-header">
                    <span class="card-title">⚡ SISTEMAS CRÍTICOS</span>
                    <div class="chart-legend" id="multiLegend"></div>
                </div>
                <div class="chart-container">
                    <canvas id="multiChart"></canvas>
                </div>
                <div class="live-values" id="multiLive"></div>
            </div>
        </div>

        <!-- GRÁFICO 3: Radar interativo -->
        <div class="grid-3">
            <div class="hud-card">
                <div class="card-header">
                    <span class="card-title">🔄 STATUS DOS SISTEMAS</span>
                </div>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
                <div class="live-values" id="radarLive"></div>
            </div>

            <!-- GRÁFICO 4: Barras com interação -->
            <div class="hud-card">
                <div class="card-header">
                    <span class="card-title">📊 RECURSOS DA NAVE</span>
                </div>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
                <div class="live-values" id="barLive"></div>
            </div>

            <!-- GRÁFICO 5: Doughnut com clique -->
            <div class="hud-card">
                <div class="card-header">
                    <span class="card-title">🍩 DISTRIBUIÇÃO DE ENERGIA</span>
                </div>
                <div class="chart-container">
                    <canvas id="doughnutChart"></canvas>
                </div>
                <div class="live-values" id="doughnutLive"></div>
            </div>
        </div>

        <!-- GRÁFICO 6: Área com zoom e pan -->
        <div class="grid-full">
            <div class="hud-card">
                <div class="card-header">
                    <span class="card-title">🌊 CONSUMO DE ENERGIA (HISTÓRICO)</span>
                    <div class="chart-legend" id="areaLegend"></div>
                </div>
                <div class="chart-container" style="height: 320px;">
                    <canvas id="areaChart"></canvas>
                </div>
                <div class="chart-controls">
                    <button class="chart-btn" onclick="zoomInArea()">🔍 ZOOM IN</button>
                    <button class="chart-btn" onclick="zoomOutArea()">🔍 ZOOM OUT</button>
                    <button class="chart-btn" onclick="resetAreaZoom()">⟳ RESET</button>
                </div>
                <div class="live-values" id="areaLive"></div>
            </div>
        </div>
    </div>

    <div class="custom-tooltip" id="customTooltip" style="display: none;"></div>
    <div class="crosshair-v" id="crosshairV" style="display: none;"></div>
    <div class="crosshair-h" id="crosshairH" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

    <script>
        // ============================================================
        // CONFIGURAÇÃO GLOBAL DO TOOLTIP E CROSSHAIR
        // ============================================================
        const tooltip = document.getElementById('customTooltip');
        const crosshairV = document.getElementById('crosshairV');
        const crosshairH = document.getElementById('crosshairH');

        function showTooltip(event, datasets, labels, pointIndex, chartId) {
            if (!pointIndex && pointIndex !== 0) {
                tooltip.style.display = 'none';
                return;
            }
            
            const rect = event.target.getBoundingClientRect();
            const x = event.clientX;
            const y = event.clientY;
            
            let html = `<div class="tooltip-title">📡 ${labels[pointIndex]}</div>`;
            
            datasets.forEach(dataset => {
                if (dataset.hidden) return;
                const value = dataset.data[pointIndex];
                let displayValue = value;
                if (chartId === 'multi' && dataset.label === 'Temperatura') displayValue = value.toFixed(0) + '°C';
                else if (chartId === 'multi' && dataset.label === 'Pressão') displayValue = value.toFixed(2) + ' atm';
                else if (chartId === 'multi' && dataset.label === 'Velocidade') displayValue = value.toFixed(0) + ' km/h';
                else if (typeof value === 'number') displayValue = value.toLocaleString();
                
                html += `
                    <div class="tooltip-row">
                        <span class="tooltip-label">${dataset.label}:</span>
                        <span class="tooltip-value">${displayValue}</span>
                    </div>
                `;
            });
            
            tooltip.innerHTML = html;
            tooltip.style.display = 'block';
            tooltip.style.left = (x + 15) + 'px';
            tooltip.style.top = (y - 40) + 'px';
            
            // Crosshair
            crosshairV.style.display = 'block';
            crosshairH.style.display = 'block';
            crosshairV.style.left = x + 'px';
            crosshairV.style.top = '0px';
            crosshairV.style.height = window.innerHeight + 'px';
            crosshairH.style.top = y + 'px';
            crosshairH.style.left = '0px';
            crosshairH.style.width = window.innerWidth + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
            crosshairV.style.display = 'none';
            crosshairH.style.display = 'none';
        }

        // ============================================================
        // GRÁFICO 1: VELOCIDADE (COM ZOOM)
        // ============================================================
        const speedCtx = document.getElementById('speedChart').getContext('2d');
        let speedChart;
        
        function initSpeedChart() {
            const labels = Array.from({length: 30}, (_, i) => `${i*2}s`);
            const speedData = Array.from({length: 30}, () => 2100 + Math.random() * 800);
            
            speedChart = new Chart(speedCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Velocidade (km/h)',
                        data: speedData,
                        borderColor: '#00ffff',
                        backgroundColor: 'rgba(0, 255, 255, 0.1)',
                        borderWidth: 2,
                        pointRadius: 3,
                        pointBackgroundColor: '#00ffff',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#88aaff' } },
                        tooltip: { enabled: false, external: (context) => {
                            const tooltipModel = context.tooltip;
                            if (tooltipModel.body && tooltipModel.dataPoints) {
                                const point = tooltipModel.dataPoints[0];
                                showTooltip({ clientX: point.element.x, clientY: point.element.y, target: speedChart.canvas }, 
                                    speedChart.data.datasets, speedChart.data.labels, point.dataIndex, 'speed');
                            } else hideTooltip();
                        } },
                        zoom: { pan: { enabled: true, mode: 'x' }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' } }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(0, 255, 255, 0.1)' }, ticks: { color: '#88aaff' } },
                        y: { grid: { color: 'rgba(0, 255, 255, 0.1)' }, ticks: { color: '#88aaff' }, title: { display: true, text: 'km/h', color: '#88aaff' } }
                    }
                }
            });
        }

        // ============================================================
        // GRÁFICO 2: MÚLTIPLAS MÉTRICAS (COM TOGGLE)
        // ============================================================
        const multiCtx = document.getElementById('multiChart').getContext('2d');
        let multiChart;
        
        function initMultiChart() {
            const labels = Array.from({length: 24}, (_, i) => `${i}h`);
            const multiData = {
                labels: labels,
                datasets: [
                    { label: 'Velocidade', data: Array.from({length: 24}, () => 2000 + Math.random() * 1000), borderColor: '#00ffff', borderWidth: 2, pointRadius: 2, tension: 0.3, hidden: false },
                    { label: 'Temperatura', data: Array.from({length: 24}, () => 3500 + Math.random() * 500), borderColor: '#ff6644', borderWidth: 2, pointRadius: 2, tension: 0.3, hidden: false, yAxisID: 'y' },
                    { label: 'Pressão', data: Array.from({length: 24}, () => 1.0 + Math.random() * 0.5), borderColor: '#44ff88', borderWidth: 2, pointRadius: 2, tension: 0.3, hidden: false, yAxisID: 'y1' }
                ]
            };
            
            multiChart = new Chart(multiCtx, {
                type: 'line',
                data: multiData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false, external: (context) => {
                            const tooltipModel = context.tooltip;
                            if (tooltipModel.body && tooltipModel.dataPoints) {
                                const point = tooltipModel.dataPoints[0];
                                showTooltip({ clientX: point.element.x, clientY: point.element.y, target: multiChart.canvas },
                                    multiChart.data.datasets, multiChart.data.labels, point.dataIndex, 'multi');
                            } else hideTooltip();
                        } }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(0, 255, 255, 0.1)' }, ticks: { color: '#88aaff' } },
                        y: { position: 'left', grid: { color: 'rgba(0, 255, 255, 0.1)' }, ticks: { color: '#00ffff' }, title: { display: true, text: 'Velocidade / Temp', color: '#00ffff' } },
                        y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#44ff88' }, title: { display: true, text: 'Pressão (atm)', color: '#44ff88' } }
                    }
                }
            });
        }

        // ============================================================
        // GRÁFICO 3: RADAR
        // ============================================================
        const radarCtx = document.getElementById('radarChart').getContext('2d');
        let radarChart;
        
        function initRadarChart() {
            radarChart = new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: ['Propulsão', 'Navegação', 'Comunicação', 'Escudos', 'Armas', 'Suporte'],
                    datasets: [{
                        label: 'Eficiência',
                        data: [92, 98, 94, 76, 87, 82],
                        borderColor: '#00ffff',
                        backgroundColor: 'rgba(0, 255, 255, 0.2)',
                        borderWidth: 2,
                        pointRadius: 5,
                        pointBackgroundColor: '#ff44ff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#88aaff' } } },
                    scales: { r: { grid: { color: 'rgba(0, 255, 255, 0.2)' }, ticks: { color: '#88aaff' }, pointLabels: { color: '#88aaff' } } }
                }
            });
        }

        // ============================================================
        // GRÁFICO 4: BARRAS
        // ============================================================
        const barCtx = document.getElementById('barChart').getContext('2d');
        let barChart;
        
        function initBarChart() {
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['Energia', 'Água', 'Oxigênio', 'Alimentos', 'Munição', 'Combustível'],
                    datasets: [{
                        label: 'Nível (%)',
                        data: [87, 64, 92, 58, 76, 71],
                        backgroundColor: 'rgba(0, 255, 255, 0.6)',
                        borderColor: '#00ffff',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#88aaff' } } },
                    scales: {
                        x: { ticks: { color: '#88aaff' }, grid: { color: 'rgba(0, 255, 255, 0.1)' } },
                        y: { ticks: { color: '#88aaff' }, grid: { color: 'rgba(0, 255, 255, 0.1)' }, max: 100, title: { display: true, text: 'Percentual (%)', color: '#88aaff' } }
                    }
                }
            });
        }

        // ============================================================
        // GRÁFICO 5: DOUGHNUT COM CLIQUE
        // ============================================================
        const doughnutCtx = document.getElementById('doughnutChart').getContext('2d');
        let doughnutChart;
        
        function initDoughnutChart() {
            doughnutChart = new Chart(doughnutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Propulsão', 'Escudos', 'Sistemas', 'Armas', 'Suporte'],
                    datasets: [{
                        data: [35, 25, 20, 12, 8],
                        backgroundColor: ['#00ffff', '#ff44ff', '#44ff88', '#ffaa44', '#8866ff'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#88aaff' } } },
                    onClick: (event, activeElements) => {
                        if (activeElements.length > 0) {
                            const index = activeElements[0].index;
                            const label = doughnutChart.data.labels[index];
                            const value = doughnutChart.data.datasets[0].data[index];
                            alert(`🔷 ${label}: ${value}% da energia total`);
                        }
                    }
                }
            });
        }

        // ============================================================
        // GRÁFICO 6: ÁREA (COM ZOOM E PAN)
        // ============================================================
        const areaCtx = document.getElementById('areaChart').getContext('2d');
        let areaChart;
        
        function initAreaChart() {
            const labels = Array.from({length: 60}, (_, i) => `${i}s`);
            const energyData = Array.from({length: 60}, () => 800 + Math.random() * 200);
            const tempData = Array.from({length: 60}, () => 3600 + Math.random() * 400);
            
            areaChart = new Chart(areaCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Energia (GW)', data: energyData, borderColor: '#00ffff', backgroundColor: 'rgba(0, 255, 255, 0.1)', borderWidth: 2, fill: true, tension: 0.3 },
                        { label: 'Temperatura (°C)', data: tempData, borderColor: '#ff6644', backgroundColor: 'rgba(255, 102, 68, 0.1)', borderWidth: 2, fill: true, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#88aaff' } },
                        tooltip: { enabled: false, external: (context) => {
                            const tooltipModel = context.tooltip;
                            if (tooltipModel.body && tooltipModel.dataPoints) {
                                const point = tooltipModel.dataPoints[0];
                                showTooltip({ clientX: point.element.x, clientY: point.element.y, target: areaChart.canvas },
                                    areaChart.data.datasets, areaChart.data.labels, point.dataIndex, 'area');
                            } else hideTooltip();
                        } },
                        zoom: { pan: { enabled: true, mode: 'xy' }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' } }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(0, 255, 255, 0.1)' }, ticks: { color: '#88aaff' } },
                        y: { grid: { color: 'rgba(0, 255, 255, 0.1)' }, ticks: { color: '#88aaff' } }
                    }
                }
            });
        }

        // ============================================================
        // FUNÇÕES DE ZOOM
        // ============================================================
        function zoomIn(chartId) { if (speedChart) speedChart.zoom(1.1); }
        function zoomOut(chartId) { if (speedChart) speedChart.zoom(0.9); }
        function resetZoom(chartId) { if (speedChart) speedChart.resetZoom(); }
        function zoomInArea() { if (areaChart) areaChart.zoom(1.1); }
        function zoomOutArea() { if (areaChart) areaChart.zoom(0.9); }
        function resetAreaZoom() { if (areaChart) areaChart.resetZoom(); }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        initSpeedChart();
        initMultiChart();
        initRadarChart();
        initBarChart();
        initDoughnutChart();
        initAreaChart();

        // Adicionar legendas interativas para toggle de datasets
        function buildMultiLegend() {
            const container = document.getElementById('multiLegend');
            if (!container) return;
            container.innerHTML = '';
            multiChart.data.datasets.forEach((dataset, i) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${dataset.borderColor}"></div>
                    <span class="legend-text">${dataset.label}</span>
                `;
                item.onclick = () => {
                    dataset.hidden = !dataset.hidden;
                    multiChart.update();
                    item.classList.toggle('hidden', dataset.hidden);
                };
                container.appendChild(item);
            });
        }
        
        setTimeout(() => {
            if (multiChart) buildMultiLegend();
        }, 500);

        // Atualizar dados em tempo real
        setInterval(() => {
            if (speedChart) {
                const newData = speedChart.data.datasets[0].data.slice(1);
                newData.push(2100 + Math.random() * 800);
                speedChart.data.datasets[0].data = newData;
                speedChart.update('none');
            }
            
            if (areaChart) {
                const newEnergy = areaChart.data.datasets[0].data.slice(1);
                const newTemp = areaChart.data.datasets[1].data.slice(1);
                newEnergy.push(800 + Math.random() * 200);
                newTemp.push(3600 + Math.random() * 400);
                areaChart.data.datasets[0].data = newEnergy;
                areaChart.data.datasets[1].data = newTemp;
                areaChart.update('none');
            }
            
            if (radarChart) {
                const newData = radarChart.data.datasets[0].data.map(() => 70 + Math.random() * 25);
                radarChart.data.datasets[0].data = newData;
                radarChart.update('none');
            }
        }, 3000);
    </script>
</body>
</html>
