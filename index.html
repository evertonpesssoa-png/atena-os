<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma • Avatar Arcano</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ HOLOGRAMA • L Y R A ✨
    </div>
    <div class="controls">
        🖱️ Arraste para rotacionar | Scroll para zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // =========================
        // CONFIGURAÇÃO INICIAL
        // =========================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.008);

        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 3.5);
        camera.lookAt(0, 1.2, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2DRenderer para texto
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 1.2, 0);

        // =========================
        // LUZES HOLOGRÁFICAS
        // =========================
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0x88aaff, 1.2);
        mainLight.position.set(2, 3, 2);
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0x44aaff, 0.8);
        backLight.position.set(-1, 1.5, -2);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xff88cc, 0.5);
        fillLight.position.set(1.5, 1, 1.5);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0x88ffcc, 0.6);
        rimLight.position.set(-1, 1.8, 1.8);
        scene.add(rimLight);

        // Luz pulsante (efeito holograma)
        const pulseLight = new THREE.PointLight(0x66ccff, 0.8);
        pulseLight.position.set(0, 1.2, 1);
        scene.add(pulseLight);

        // =========================
        // PARTÍCULAS DE FUNDO
        // =========================
        const particleCount = 1500;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesPositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlesPositions[i*3] = (Math.random() - 0.5) * 30;
            particlesPositions[i*3+1] = (Math.random() - 0.5) * 15;
            particlesPositions[i*3+2] = (Math.random() - 0.5) * 20 - 10;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x44aaff, size: 0.03, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // =========================
        // CHÃO HOLOGRÁFICO
        // =========================
        const gridHelper = new THREE.GridHelper(6, 20, 0x44aaff, 0x2288cc);
        gridHelper.position.y = -0.8;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const ringFloor = new THREE.Mesh(
            new THREE.RingGeometry(0.8, 1.5, 32),
            new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2288cc, emissiveIntensity: 0.3, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
        );
        ringFloor.rotation.x = -Math.PI / 2;
        ringFloor.position.y = -0.75;
        scene.add(ringFloor);

        // =========================
        // CRIAÇÃO DO AVATAR HOLOGRAMA
        // =========================
        const hologramGroup = new THREE.Group();
        
        // CORPO (vestido cyberpunk)
        const bodyGeo = new THREE.CylinderGeometry(0.28, 0.32, 0.85, 12);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x3366cc, emissiveIntensity: 0.25, metalness: 0.7, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.4;
        hologramGroup.add(body);
        
        // CABEÇA
        const headGeo = new THREE.SphereGeometry(0.28, 24, 24);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, emissive: 0xffaa88, emissiveIntensity: 0.15 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.85;
        hologramGroup.add(head);
        
        // CABELO (estilo anime - com volumetria)
        const hairGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const hairMat = new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff44aa, emissiveIntensity: 0.2 });
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.y = 1.0;
        hair.scale.set(1.05, 0.5, 1.1);
        hologramGroup.add(hair);
        
        // Topo do cabelo (ponta)
        const hairTopGeo = new THREE.ConeGeometry(0.18, 0.25, 8);
        const hairTop = new THREE.Mesh(hairTopGeo, hairMat);
        hairTop.position.y = 1.12;
        hologramGroup.add(hairTop);
        
        // FRANJA
        const fringeGeo = new THREE.BoxGeometry(0.45, 0.08, 0.15);
        const fringeMat = new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff44aa, emissiveIntensity: 0.15 });
        const fringe = new THREE.Mesh(fringeGeo, fringeMat);
        fringe.position.set(0, 1.0, 0.28);
        hologramGroup.add(fringe);
        
        // OLHOS (estilo anime)
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x44aaff, emissiveIntensity: 0.4 });
        
        const leftEyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), eyeWhiteMat);
        leftEyeWhite.position.set(-0.11, 0.92, 0.29);
        hologramGroup.add(leftEyeWhite);
        
        const rightEyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), eyeWhiteMat);
        rightEyeWhite.position.set(0.11, 0.92, 0.29);
        hologramGroup.add(rightEyeWhite);
        
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), eyePupilMat);
        leftPupil.position.set(-0.11, 0.91, 0.35);
        hologramGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), eyePupilMat);
        rightPupil.position.set(0.11, 0.91, 0.35);
        hologramGroup.add(rightPupil);
        
        // SOBRANCELHAS
        const browMat = new THREE.MeshStandardMaterial({ color: 0xff66aa });
        const leftBrow = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.05), browMat);
        leftBrow.position.set(-0.13, 1.02, 0.31);
        hologramGroup.add(leftBrow);
        
        const rightBrow = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.05), browMat);
        rightBrow.position.set(0.13, 1.02, 0.31);
        hologramGroup.add(rightBrow);
        
        // BOCA (curva usando um torus pequeno)
        const mouthGeo = new THREE.TorusGeometry(0.07, 0.02, 8, 20, Math.PI);
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0xff8888 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.rotation.x = 0.2;
        mouth.position.set(0, 0.78, 0.32);
        hologramGroup.add(mouth);
        
        // BRAÇOS
        const armMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.55, 6), armMat);
        leftArm.position.set(-0.45, 0.65, 0);
        leftArm.rotation.z = 0.3;
        leftArm.rotation.x = -0.2;
        hologramGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.55, 6), armMat);
        rightArm.position.set(0.45, 0.65, 0);
        rightArm.rotation.z = -0.3;
        rightArm.rotation.x = 0.2;
        hologramGroup.add(rightArm);
        
        // MÃOS
        const handMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), handMat);
        leftHand.position.set(-0.7, 0.38, 0.05);
        hologramGroup.add(leftHand);
        
        const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), handMat);
        rightHand.position.set(0.7, 0.38, -0.05);
        hologramGroup.add(rightHand);
        
        // SAIAS/VESTIDO (sobreposição)
        const skirtGeo = new THREE.CylinderGeometry(0.45, 0.55, 0.35, 8);
        const skirtMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x3366cc, emissiveIntensity: 0.2, transparent: true, opacity: 0.85 });
        const skirt = new THREE.Mesh(skirtGeo, skirtMat);
        skirt.position.y = 0.15;
        hologramGroup.add(skirt);
        
        // ACESSÓRIOS: COROA/DIADEMA HOLOGRÁFICO
        const crownGeo = new THREE.TorusGeometry(0.22, 0.04, 12, 30);
        const crownMat = new THREE.MeshStandardMaterial({ color: 0xff88cc, emissive: 0xff44aa, emissiveIntensity: 0.5 });
        const crown = new THREE.Mesh(crownGeo, crownMat);
        crown.position.y = 1.08;
        crown.rotation.x = Math.PI / 2;
        hologramGroup.add(crown);
        
        const crownGem = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.12, 6), crownMat);
        crownGem.position.y = 1.15;
        hologramGroup.add(crownGem);
        
        // AURA HOLOGRÁFICA (anel de luz)
        const auraGeo = new THREE.TorusGeometry(0.65, 0.025, 32, 60);
        const auraMat = new THREE.MeshStandardMaterial({ color: 0x66ccff, emissive: 0x44aaff, emissiveIntensity: 0.6 });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        aura.position.y = 0.55;
        hologramGroup.add(aura);
        
        const aura2 = new THREE.Mesh(auraGeo, auraMat);
        aura2.scale.set(1.15, 1.15, 1.15);
        aura2.position.y = 0.55;
        hologramGroup.add(aura2);
        
        scene.add(hologramGroup);

        // =========================
        // NOME HOLOGRÁFICO (CSS2D)
        // =========================
        const nameDiv = document.createElement('div');
        nameDiv.textContent = '⚡ L Y R A • HOLOGRAMA ⚡';
        nameDiv.style.color = '#88ddff';
        nameDiv.style.fontSize = '14px';
        nameDiv.style.fontFamily = 'monospace';
        nameDiv.style.fontWeight = 'bold';
        nameDiv.style.textShadow = '0 0 10px #44aaff';
        nameDiv.style.background = 'rgba(0,0,0,0.5)';
        nameDiv.style.padding = '6px 14px';
        nameDiv.style.borderRadius = '30px';
        nameDiv.style.border = '1px solid #44aaff';
        nameDiv.style.backdropFilter = 'blur(8px)';
        nameDiv.style.whiteSpace = 'nowrap';
        
        const nameLabel = new CSS2DObject(nameDiv);
        nameLabel.position.set(0, 1.35, 0);
        scene.add(nameLabel);
        
        // =========================
        // PÓS-PROCESSAMENTO (Efeito Scanline)
        // =========================
        // Criando um overlay de scanlines
        const scanlineOverlay = document.createElement('div');
        scanlineOverlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 200, 0.03) 0px,
                rgba(0, 255, 200, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            z-index: 1000;
        `;
        document.body.appendChild(scanlineOverlay);
        
        // Efeito de vignette
        const vignette = document.createElement('div');
        vignette.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6) 100%);
            z-index: 999;
        `;
        document.body.appendChild(vignette);

        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Flutuação do holograma
            hologramGroup.position.y = Math.sin(time * 1.5) * 0.03;
            
            // Rotação dos anéis de aura
            aura.rotation.z = time * 1.2;
            aura2.rotation.z = -time * 0.8;
            
            // Piscar dos olhos (a cada 4 segundos)
            const blink = Math.sin(time * 1.5) > 0.98;
            if (blink) {
                leftPupil.scale.set(1, 0.1, 1);
                rightPupil.scale.set(1, 0.1, 1);
            } else {
                leftPupil.scale.set(1, 1, 1);
                rightPupil.scale.set(1, 1, 1);
            }
            
            // Luz pulsante
            pulseLight.intensity = 0.6 + Math.sin(time * 4) * 0.3;
            
            // Partículas girando lentamente
            particles.rotation.y = time * 0.03;
            particles.rotation.x = Math.sin(time * 0.1) * 0.05;
            
            // Controle de auto-rotação do OrbitControls
            controls.update();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();

        // =========================
        // RESIZE
        // =========================
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('✨ Holograma L Y R A carregado! ✨');
    </script>
</body>
</html>
