<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IRON MAN HUD - Armadura Holográfica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: #000000;
        }

        /* ============================================================ */
        /* HUD ESTILO IRON MAN - AZUL NEON / HOLOGRÁFICO */
        /* ============================================================ */
        
        .hud-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            pointer-events: none;
        }

        /* Scanlines finas */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 150, 255, 0.03) 0px,
                rgba(0, 150, 255, 0.03) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 60;
        }

        /* Vignette suave */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 55;
        }

        /* ============================================================ */
        /* BARRA SUPERIOR - ESTILO JARVIS */
        /* ============================================================ */
        .hud-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: linear-gradient(180deg, rgba(0,20,40,0.95) 0%, rgba(0,10,20,0.8) 100%);
            border-bottom: 1px solid #00aaff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            backdrop-filter: blur(5px);
            z-index: 70;
            box-shadow: 0 0 15px rgba(0,170,255,0.15);
        }

        .hud-logo {
            color: #00aaff;
            font-size: 13px;
            letter-spacing: 5px;
            text-shadow: 0 0 8px #00aaff;
            font-weight: bold;
        }

        .hud-logo span {
            color: #88ccff;
        }

        .jarvis-status {
            color: #88ccff;
            font-size: 11px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .jarvis-status .led {
            width: 8px;
            height: 8px;
            background: #00aaff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00aaff;
            animation: pulseLed 1.2s infinite;
        }

        .hud-time {
            color: #00aaff;
            font-size: 13px;
            font-family: monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00aaff;
        }

        /* ============================================================ */
        /* ANEL DE ANÁLISE (ESTILO REPULSOR) */
        /* ============================================================ */
        .analysis-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid rgba(0, 170, 255, 0.3);
            z-index: 65;
        }
        .analysis-ring::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            border: 1px solid #00aaff;
            opacity: 0.5;
            animation: ringPulse 2s ease-out infinite;
        }
        .analysis-ring::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 170, 255, 0.4);
        }

        /* ============================================================ */
        /* MIRA CENTRAL (ESTILO HUD DO IRON MAN) */
        /* ============================================================ */
        .hud-crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            z-index: 70;
        }
        .crosshair-outer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 1.5px solid #00aaff;
            border-radius: 50%;
            box-shadow: 0 0 15px #00aaff, inset 0 0 5px #00aaff;
            opacity: 0.8;
        }
        .crosshair-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 1px solid #88ccff;
            border-radius: 50%;
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #00aaff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00aaff;
        }
        .crosshair-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .crosshair-lines .line {
            position: absolute;
            background: #00aaff;
            box-shadow: 0 0 5px #00aaff;
        }
        .line-h {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            transform: translateY(-50%);
        }
        .line-v {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            transform: translateX(-50%);
        }
        .line-diag {
            top: 50%;
            left: 50%;
            width: 50px;
            height: 1px;
            transform-origin: center;
        }
        .diag-1 { transform: translate(-50%, -50%) rotate(45deg); }
        .diag-2 { transform: translate(-50%, -50%) rotate(-45deg); }

        /* ============================================================ */
        /* CIRCULO DE RASTREAMENTO (INIMIGOS/ALVOS) */
        /* ============================================================ */
        .tracking-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 65;
        }
        .track {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255, 68, 68, 0.6);
            border-radius: 50%;
            animation: trackPulse 1.5s infinite;
        }
        .track::before {
            content: 'TARGET';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: #ff4444;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* ============================================================ */
        /* DADOS DA ARMADURA (LADO ESQUERDO) */
        /* ============================================================ */
        .armor-stats {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 10, 20, 0.7);
            backdrop-filter: blur(8px);
            padding: 20px 25px;
            border-left: 3px solid #00aaff;
            border-radius: 0 8px 8px 0;
            z-index: 70;
            font-family: monospace;
        }
        .armor-stats .stat {
            margin: 12px 0;
        }
        .armor-stats .stat-label {
            color: #88aaff;
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 3px;
        }
        .armor-stats .stat-value {
            color: #00aaff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px #00aaff;
        }
        .armor-stats .stat-unit {
            color: #88aaff;
            font-size: 9px;
        }

        /* ============================================================ */
        /* SISTEMAS (LADO DIREITO) */
        /* ============================================================ */
        .systems-status {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 10, 20, 0.7);
            backdrop-filter: blur(8px);
            padding: 20px 25px;
            border-right: 3px solid #00aaff;
            border-radius: 8px 0 0 8px;
            text-align: right;
            z-index: 70;
        }
        .systems-status .sys-item {
            margin: 12px 0;
        }
        .systems-status .sys-label {
            color: #88aaff;
            font-size: 9px;
            letter-spacing: 2px;
        }
        .systems-status .sys-value {
            color: #00aaff;
            font-size: 14px;
            font-weight: bold;
        }
        .systems-status .sys-online {
            color: #44ff88;
            text-shadow: 0 0 3px #44ff88;
        }

        /* ============================================================ */
        /* BARRA INFERIOR (STATUS DO REATOR) */
        /* ============================================================ */
        .reactor-status {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(0deg, rgba(0,20,40,0.95) 0%, rgba(0,10,20,0.8) 100%);
            border-top: 1px solid #00aaff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            z-index: 70;
        }
        .reactor-item {
            color: #88aaff;
            font-size: 10px;
            letter-spacing: 2px;
        }
        .reactor-item .value {
            color: #00aaff;
            font-weight: bold;
        }
        .reactor-item .warning {
            color: #ffaa44;
        }

        /* ============================================================ */
        /* ANIMAÇÕES */
        /* ============================================================ */
        @keyframes pulseLed {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes ringPulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.15); }
        }
        @keyframes trackPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); box-shadow: 0 0 10px rgba(255,68,68,0.5); }
        }

        /* Loading */
        #loading {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00aaff;
            font-family: monospace;
            z-index: 200;
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid #00aaff;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: pulse 1.5s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #00aaff; }
            50% { opacity: 0.6; box-shadow: 0 0 25px #00aaff; }
        }

        /* Botão tela cheia */
        .fullscreen-btn {
            position: fixed;
            bottom: 60px;
            right: 30px;
            background: rgba(0, 10, 20, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #00aaff;
            color: #00aaff;
            font-family: monospace;
            font-size: 10px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 80;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .fullscreen-btn:hover {
            background: rgba(0, 170, 255, 0.2);
            box-shadow: 0 0 12px #00aaff;
        }
    </style>
</head>
<body>
    <!-- HUD ESTILO IRON MAN -->
    <div class="hud-container">
        <div class="scanlines"></div>
        <div class="vignette"></div>
        
        <!-- Barra superior JARVIS -->
        <div class="hud-top-bar">
            <div class="hud-logo">✦ <span>MARK</span> LXXXV ✦</div>
            <div class="jarvis-status">
                <div class="led"></div>
                JARVIS • ONLINE
                <div class="led"></div>
                ARMADURA • ATIVA
            </div>
            <div class="hud-time" id="hudClock">00:00:00</div>
        </div>
        
        <!-- Anel de análise -->
        <div class="analysis-ring"></div>
        
        <!-- Mira central Iron Man -->
        <div class="hud-crosshair">
            <div class="crosshair-outer"></div>
            <div class="crosshair-inner"></div>
            <div class="crosshair-dot"></div>
            <div class="crosshair-lines">
                <div class="line line-h"></div>
                <div class="line line-v"></div>
                <div class="line line-diag diag-1" style="width: 45px;"></div>
                <div class="line line-diag diag-2" style="width: 45px;"></div>
            </div>
        </div>
        
        <!-- Rastreamento de alvos -->
        <div class="tracking-circles">
            <div class="track" style="top: 25%; left: 65%;"></div>
            <div class="track" style="top: 55%; left: 20%; animation-delay: 0.5s;"></div>
            <div class="track" style="top: 70%; left: 75%; animation-delay: 1s;"></div>
        </div>
        
        <!-- Estatísticas da armadura (esquerda) -->
        <div class="armor-stats">
            <div class="stat">
                <div class="stat-label">POWER LEVEL</div>
                <div class="stat-value" id="powerLevel">98<span style="font-size: 14px;">%</span></div>
            </div>
            <div class="stat">
                <div class="stat-label">ARMOR INTEGRITY</div>
                <div class="stat-value" id="armorIntegrity">87<span style="font-size: 14px;">%</span></div>
            </div>
            <div class="stat">
                <div class="stat-label">REPULSOR CHARGE</div>
                <div class="stat-value" id="repulsorCharge">100<span style="font-size: 14px;">%</span></div>
            </div>
        </div>
        
        <!-- Status dos sistemas (direita) -->
        <div class="systems-status">
            <div class="sys-item">
                <div class="sys-label">FLIGHT SYSTEM</div>
                <div class="sys-value sys-online" id="flightSys">ONLINE</div>
            </div>
            <div class="sys-item">
                <div class="sys-label">WEAPONS</div>
                <div class="sys-value sys-online" id="weaponsSys">ARMED</div>
            </div>
            <div class="sys-item">
                <div class="sys-label">HOLOGRAM</div>
                <div class="sys-value sys-online" id="holoSys">ACTIVE</div>
            </div>
            <div class="sys-item">
                <div class="sys-label">COMMS LINK</div>
                <div class="sys-value" id="commsSys">STABLE</div>
            </div>
        </div>
        
        <!-- Barra inferior (Reator Arc) -->
        <div class="reactor-status">
            <div class="reactor-item">⚡ REATOR ARC: <span class="value" id="arcPower">3.2</span> GW</div>
            <div class="reactor-item">🌡️ TEMP: <span class="value" id="coreTemp">3,842</span>°C</div>
            <div class="reactor-item">🔷 STATUS: <span class="value" id="coreStatus">NOMINAL</span></div>
        </div>
        
        <button class="fullscreen-btn" id="fullscreenBtn">🔲 HOLOGRAM VIEW</button>
    </div>
    
    <div id="loading">🔷 REATOR INICIALIZANDO... 🔷</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ============================================================
        // RELÓGIO E DADOS HUD
        // ============================================================
        function updateHUDClock() {
            const now = new Date();
            const hours = String(now.getUTCHours()).padStart(2, '0');
            const minutes = String(now.getUTCMinutes()).padStart(2, '0');
            const seconds = String(now.getUTCSeconds()).padStart(2, '0');
            document.getElementById('hudClock').textContent = `${hours}:${minutes}:${seconds} UTC`;
        }
        updateHUDClock();
        setInterval(updateHUDClock, 1000);
        
        // Simular telemetria da armadura
        let hudTime = 0;
        setInterval(() => {
            hudTime += 0.3;
            const power = 98 + Math.sin(hudTime * 0.5) * 1.5;
            const armor = 87 + Math.sin(hudTime * 0.3) * 2;
            const repulsor = 100 + Math.sin(hudTime * 0.8) * 0;
            const arcPower = 3.2 + Math.sin(hudTime * 0.4) * 0.1;
            const coreTemp = 3842 + Math.sin(hudTime * 0.6) * 15;
            
            document.getElementById('powerLevel').innerHTML = Math.floor(power) + '<span style="font-size: 14px;">%</span>';
            document.getElementById('armorIntegrity').innerHTML = Math.floor(armor) + '<span style="font-size: 14px;">%</span>';
            document.getElementById('repulsorCharge').innerHTML = Math.floor(repulsor) + '<span style="font-size: 14px;">%</span>';
            document.getElementById('arcPower').textContent = arcPower.toFixed(1);
            document.getElementById('coreTemp').textContent = Math.floor(coreTemp).toLocaleString();
            
            // Status dinâmicos
            const flightStatus = Math.sin(hudTime * 0.7) > 0 ? 'ONLINE' : 'STANDBY';
            const commsStatus = Math.sin(hudTime * 0.5) > 0.3 ? 'STABLE' : 'SCANNING';
            document.getElementById('flightSys').textContent = flightStatus;
            document.getElementById('flightSys').style.color = flightStatus === 'ONLINE' ? '#44ff88' : '#ffaa44';
            document.getElementById('commsSys').textContent = commsStatus;
            
            // Status do reator
            const tempPercent = (coreTemp - 3500) / 500;
            if (tempPercent > 0.8) {
                document.getElementById('coreStatus').textContent = 'WARNING';
                document.getElementById('coreStatus').style.color = '#ff6644';
            } else {
                document.getElementById('coreStatus').textContent = 'NOMINAL';
                document.getElementById('coreStatus').style.color = '#44ff88';
            }
        }, 400);
        
        // ============================================================
        // TELA CHEIA
        // ============================================================
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.innerHTML = '🔳 SAIR';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '🔲 HOLOGRAM VIEW';
            }
        }
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        
        // ============================================================
        // THREE.JS - REATOR ARC 3D
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.2, 3.2);
        camera.lookAt(0, 0.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Efeito Bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.2, 0.5, 0.12
        );
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
        }, 800);

        // ============================================================
        // REATOR ARC (ESTILO PEITO DO IRON MAN)
        // ============================================================
        
        // Anel externo
        const ringOuterGeo = new THREE.TorusGeometry(0.55, 0.03, 64, 128);
        const ringOuterMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x0066aa, emissiveIntensity: 0.6 });
        const ringOuter = new THREE.Mesh(ringOuterGeo, ringOuterMat);
        ringOuter.position.set(0, -0.55, 0.3);
        scene.add(ringOuter);
        
        // Anel interno
        const ringInnerGeo = new THREE.TorusGeometry(0.42, 0.02, 64, 128);
        const ringInnerMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x0088cc, emissiveIntensity: 0.5 });
        const ringInner = new THREE.Mesh(ringInnerGeo, ringInnerMat);
        ringInner.position.set(0, -0.55, 0.3);
        scene.add(ringInner);
        
        // Esfera central (núcleo do reator)
        const coreGeo = new THREE.SphereGeometry(0.22, 64, 64);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x00aaff, emissiveIntensity: 0.8, metalness: 0.9, roughness: 0.2 });
        const coreSphere = new THREE.Mesh(coreGeo, coreMat);
        coreSphere.position.set(0, -0.55, 0.3);
        scene.add(coreSphere);
        
        // Partículas ao redor do reator (efeito energia)
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.65;
            particlePositions[i*3] = Math.cos(angle) * radius * (Math.random() - 0.5);
            particlePositions[i*3+1] = -0.55 + Math.sin(angle) * radius * 0.8;
            particlePositions[i*3+2] = 0.3 + Math.sin(angle) * radius * 0.5;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x44ccff, size: 0.008, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Raios de luz (estilo repulsor)
        const rayCount = 8;
        const rays = [];
        for (let i = 0; i < rayCount; i++) {
            const angle = (i / rayCount) * Math.PI * 2;
            const rayGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.35, 6);
            const rayMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x00aaff, emissiveIntensity: 0.5 });
            const ray = new THREE.Mesh(rayGeo, rayMat);
            ray.position.set(Math.cos(angle) * 0.65, -0.55 + Math.sin(angle) * 0.65 * 0.6, 0.3);
            ray.lookAt(0, -0.55, 0.3);
            scene.add(ray);
            rays.push(ray);
        }
        
        // ============================================================
        // HOLOGRAMA DE PONTOS (ESTILO JARVIS)
        // ============================================================
        const hologramPoints = [];
        // Criar uma esfera de pontos ao redor
        for (let i = 0; i < 1200; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 1.2;
            const x = Math.sin(phi) * Math.cos(theta) * r;
            const y = Math.sin(phi) * Math.sin(theta) * r * 0.6 + 0.2;
            const z = Math.cos(phi) * r * 0.8;
            hologramPoints.push(x, y, z);
        }
        const holoGeo = new THREE.BufferGeometry();
        holoGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(hologramPoints), 3));
        const holoMat = new THREE.PointsMaterial({ color: 0x00aaff, size: 0.012, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const hologramField = new THREE.Points(holoGeo, holoMat);
        scene.add(hologramField);
        
        // ============================================================
        // ANIMAÇÃO
        // ============================================================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Rotação dos anéis
            ringOuter.rotation.z += 0.01;
            ringInner.rotation.z -= 0.008;
            
            // Pulso da esfera central
            const scale = 1 + Math.sin(time * 8) * 0.04;
            coreSphere.scale.set(scale, scale, scale);
            
            // Raios de luz pulsando
            rays.forEach((ray, idx) => {
                const intensity = 0.4 + Math.sin(time * 10 + idx) * 0.2;
                ray.material.emissiveIntensity = intensity;
            });
            
            // Partículas girando
            particles.rotation.y += 0.01;
            particles.rotation.x = Math.sin(time * 0.5) * 0.1;
            
            // Holograma girando suavemente
            hologramField.rotation.y += 0.002;
            hologramField.rotation.x = Math.sin(time * 0.3) * 0.05;
            
            effectComposer.render();
        }
        
        animate();
        
        // ============================================================
        // RESPONSIVO
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
