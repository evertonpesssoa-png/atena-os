<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma - Mulher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            overflow: hidden;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #instrucoes {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff66cc;
            background: rgba(0,0,0,0.5);
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instrucoes">
        💜 Holograma Feminino | Use o dedo para girar | Toque e arraste
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ======================
        // CENA
        // ======================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);
        
        // ======================
        // CÂMERA
        // ======================
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 4.8);
        
        // ======================
        // RENDERER
        // ======================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // ======================
        // CONTROLES
        // ======================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 1.2;
        controls.target.set(0, 1, 0);
        
        // ======================
        // HOLOGRAMA - CONTOURNO DA MULHER
        // ======================
        const positions = [];
        
        // ===== CABEÇA (formato oval suave) =====
        for (let ang = 0; ang < 360; ang += 4) {
            const rad = ang * Math.PI / 180;
            const px = Math.cos(rad) * 0.38;
            const py = 1.85 + Math.sin(rad) * 0.48;
            const pz = (Math.random() - 0.5) * 0.08;
            positions.push(px, py, pz);
        }
        
        // ===== PESCOÇO =====
        for (let ang = -25; ang <= 25; ang += 5) {
            const rad = ang * Math.PI / 180;
            const px = Math.cos(rad) * 0.19;
            for (let y = 1.48; y <= 1.72; y += 0.04) {
                positions.push(px, y, (Math.random() - 0.5) * 0.08);
            }
        }
        
        // ===== OMBROS (curva sensual) =====
        for (let x = -0.65; x <= 0.65; x += 0.035) {
            const y = 1.48 - Math.abs(x) * 0.18;
            positions.push(x, y, (Math.random() - 0.5) * 0.08);
        }
        
        // ===== BRAÇOS (finos e delicados) =====
        for (let side = -1; side <= 1; side += 2) {
            for (let y = 0.85; y <= 1.42; y += 0.045) {
                const x = side * (0.52 - (1.42 - y) * 0.15);
                positions.push(x, y, (Math.random() - 0.5) * 0.1);
            }
            // Antebraços
            for (let y = 0.45; y <= 0.82; y += 0.045) {
                const x = side * (0.44 - (0.82 - y) * 0.1);
                positions.push(x, y, (Math.random() - 0.5) * 0.1);
            }
        }
        
        // ===== TRONCO (curvas femininas - peito, cintura fina, quadril largo) =====
        // Lado esquerdo e direito do corpo
        for (let y = 0.45; y <= 1.45; y += 0.035) {
            let width;
            if (y > 1.25) {
                width = 0.44;  // busto
            } else if (y > 0.95) {
                width = 0.36;  // cintura fina
            } else if (y > 0.55) {
                width = 0.48;  // quadril largo
            } else {
                width = 0.42;  // virilha
            }
            positions.push(-width, y, (Math.random() - 0.5) * 0.1);
            positions.push(width, y, (Math.random() - 0.5) * 0.1);
        }
        
        // ===== CINTURA (marcação especial) =====
        for (let ang = 0; ang < 360; ang += 15) {
            const rad = ang * Math.PI / 180;
            const px = Math.cos(rad) * 0.31;
            const py = 0.98;
            positions.push(px, py, (Math.random() - 0.5) * 0.08);
        }
        
        // ===== QUADRIL (curvas largas) =====
        for (let ang = 0; ang < 360; ang += 8) {
            const rad = ang * Math.PI / 180;
            const px = Math.cos(rad) * 0.52;
            for (let y = 0.6; y <= 0.9; y += 0.04) {
                positions.push(px, y, (Math.random() - 0.5) * 0.1);
            }
        }
        
        // ===== PERNAS (longas e finas) =====
        for (let leg = -1; leg <= 1; leg += 2) {
            // Coxas
            for (let y = 0.2; y <= 0.58; y += 0.04) {
                const x = leg * 0.2;
                positions.push(x, y, (Math.random() - 0.5) * 0.08);
            }
            // Panturrilhas
            for (let y = -0.35; y <= 0.18; y += 0.04) {
                const x = leg * 0.15;
                positions.push(x, y, (Math.random() - 0.5) * 0.08);
            }
            // Pés (leve toque)
            positions.push(leg * 0.12, -0.42, (Math.random() - 0.5) * 0.1);
        }
        
        // ===== CABELO (longo e volumoso, caindo dos ombros) =====
        for (let i = 0; i < 1800; i++) {
            const ang = Math.random() * Math.PI * 2;
            const raio = 0.45 + Math.random() * 0.35;
            const yOff = 1.7 + Math.random() * 0.6;
            const xOff = Math.cos(ang) * raio * (1 - (yOff - 1.7) * 0.4);
            const yOffFinal = yOff - Math.random() * 0.25;
            positions.push(xOff, yOffFinal, (Math.random() - 0.5) * 0.2);
        }
        
        // ===== DETALHES: BUSTO (curvas suaves) =====
        for (let ang = 0; ang < 360; ang += 12) {
            const rad = ang * Math.PI / 180;
            const px = 0.48 + Math.cos(rad) * 0.09;
            const py = 1.32 + Math.sin(rad) * 0.09;
            positions.push(px, py, 0.12);
            positions.push(-px, py, 0.12);
        }
        
        // ===== DETALHES: VIRILHA/QUADRIL =====
        for (let ang = 0; ang < 360; ang += 15) {
            const rad = ang * Math.PI / 180;
            const px = Math.cos(rad) * 0.44;
            const py = 0.5 + Math.sin(rad) * 0.08;
            positions.push(px, py, (Math.random() - 0.5) * 0.1);
        }
        
        console.log(`✨ Holograma criado: ${positions.length / 3} pontos formando o contorno`);
        
        // ======================
        // CRIAR OS PONTOS
        // ======================
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        
        const material = new THREE.PointsMaterial({
            color: 0xff44aa,  // rosa/azul vibrante
            size: 0.042,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending
        });
        
        const hologram = new THREE.Points(geometry, material);
        scene.add(hologram);
        
        // ======================
        // PARTÍCULAS FLUTUANTES (efeito mágico)
        // ======================
        const floatingCount = 1500;
        const floatingPos = [];
        for (let i = 0; i < floatingCount; i++) {
            floatingPos.push((Math.random() - 0.5) * 6.5);
            floatingPos.push((Math.random() - 0.5) * 4.5 + 0.5);
            floatingPos.push((Math.random() - 0.5) * 4.5);
        }
        const floatingGeo = new THREE.BufferGeometry();
        floatingGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(floatingPos), 3));
        const floatingMat = new THREE.PointsMaterial({
            color: 0xff77cc,
            size: 0.02,
            transparent: true,
            opacity: 0.35,
            blending: THREE.AdditiveBlending
        });
        const floatingPoints = new THREE.Points(floatingGeo, floatingMat);
        scene.add(floatingPoints);
        
        // ======================
        // PONTOS EXTRA: CABELO (tons diferentes)
        // ======================
        const hairPositions = [];
        for (let i = 0; i < 800; i++) {
            const ang = Math.random() * Math.PI * 2;
            const raio = 0.5 + Math.random() * 0.45;
            const yOff = 1.65 + Math.random() * 0.7;
            hairPositions.push(Math.cos(ang) * raio, yOff, (Math.random() - 0.5) * 0.22);
        }
        const hairGeo = new THREE.BufferGeometry();
        hairGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(hairPositions), 3));
        const hairMat = new THREE.PointsMaterial({
            color: 0xff88dd,
            size: 0.035,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending
        });
        const hairPoints = new THREE.Points(hairGeo, hairMat);
        scene.add(hairPoints);
        
        // ======================
        // ANIMAÇÃO
        // ======================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            hologram.rotation.y = Math.sin(time * 0.12) * 0.08;
            hologram.position.y = Math.sin(time * 0.9) * 0.015;
            
            hairPoints.rotation.y = Math.sin(time * 0.12) * 0.08;
            hairPoints.position.y = Math.sin(time * 0.9) * 0.015;
            
            floatingPoints.rotation.y += 0.0012;
            floatingPoints.rotation.x = Math.sin(time * 0.08) * 0.03;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ======================
        // RESPONSIVO
        // ======================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
