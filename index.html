<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma - Atena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            overflow: hidden;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Instruções simples */
        #instrucoes {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: #3399ff;
            background: rgba(0,0,0,0.5);
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instrucoes">
        🖱️ Use o dedo para girar e ver o holograma de todos os ângulos
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ======================
        // CENA
        // ======================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        // ======================
        // CÂMERA
        // ======================
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 4.5);
        
        // ======================
        // RENDERER
        // ======================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // ======================
        // CONTROLES (permite navegar com o dedo)
        // ======================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1, 0);
        
        // ======================
        // CARREGAR IMAGEM E CRIAR HOLOGRAMA
        // ======================
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = "./atena.png";
        
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;
            
            const positions = [];
            const step = 3;  // Quanto maior, mais espaçado (recomendo 3)
            
            for (let y = 0; y < img.height; y += step) {
                for (let x = 0; x < img.width; x += step) {
                    const index = (y * img.width + x) * 4;
                    const r = data[index];
                    const g = data[index+1];
                    const b = data[index+2];
                    const brightness = r + g + b;
                    
                    // Só pega pixels claros (a silhueta da mulher)
                    if (brightness > 80) {
                        const px = (x / img.width) * 4.5 - 2.25;
                        const py = 2.2 - (y / img.height) * 3.8;
                        const pz = (Math.random() - 0.5) * 0.3;
                        positions.push(px, py, pz);
                    }
                }
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x3399ff,
                size: 0.05,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            const hologram = new THREE.Points(geometry, material);
            scene.add(hologram);
            
            // Partículas flutuantes ao redor (efeito holograma)
            const floatingCount = 1000;
            const floatingPos = [];
            for (let i = 0; i < floatingCount; i++) {
                floatingPos.push((Math.random() - 0.5) * 6);
                floatingPos.push((Math.random() - 0.5) * 4 + 0.5);
                floatingPos.push((Math.random() - 0.5) * 4);
            }
            const floatingGeo = new THREE.BufferGeometry();
            floatingGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(floatingPos), 3));
            const floatingMat = new THREE.PointsMaterial({
                color: 0x66ccff,
                size: 0.02,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            const floatingPoints = new THREE.Points(floatingGeo, floatingMat);
            scene.add(floatingPoints);
            
            // Animação suave
            let time = 0;
            
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;
                
                hologram.rotation.y = Math.sin(time * 0.15) * 0.1;
                hologram.position.y = Math.sin(time * 0.8) * 0.02;
                
                floatingPoints.rotation.y += 0.001;
                floatingPoints.rotation.x = Math.sin(time * 0.1) * 0.05;
                
                controls.update();
                renderer.render(scene, camera);
            }
            
            animate();
        };
        
        img.onerror = () => {
            // Fallback: criar uma silhueta feminina simples se a imagem não carregar
            const positions = [];
            
            // Cabeça
            for (let i = 0; i < 360; i++) {
                const rad = i * Math.PI / 180;
                positions.push(Math.cos(rad) * 0.4, 1.8 + Math.sin(rad) * 0.5, (Math.random() - 0.5) * 0.2);
            }
            // Corpo
            for (let y = 0; y <= 1.4; y += 0.05) {
                const width = 0.35;
                for (let i = 0; i < 20; i++) {
                    const rad = i * Math.PI * 2 / 20;
                    positions.push(Math.cos(rad) * width, y, (Math.random() - 0.5) * 0.2);
                }
            }
            // Braços
            for (let side = -1; side <= 1; side += 2) {
                for (let y = 0.9; y <= 1.4; y += 0.08) {
                    positions.push(side * 0.55, y, (Math.random() - 0.5) * 0.15);
                }
            }
            // Cabelo
            for (let i = 0; i < 500; i++) {
                const ang = Math.random() * Math.PI * 2;
                const raio = 0.45 + Math.random() * 0.2;
                positions.push(Math.cos(ang) * raio, 1.9 + Math.random() * 0.4, (Math.random() - 0.5) * 0.25);
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x3399ff,
                size: 0.05,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            
            const hologram = new THREE.Points(geometry, material);
            scene.add(hologram);
            
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;
                hologram.rotation.y = Math.sin(time * 0.15) * 0.1;
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        };
        
        // Ajustar tamanho da tela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
