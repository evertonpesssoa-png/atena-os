<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATENA OS</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      overflow:hidden;
      background:#02030a;
      color:#00ffff;
    }

    canvas{
      position:fixed;
      inset:0;
      z-index:1;
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
      repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02),
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 3px
      );
      mix-blend-mode:screen;
      animation:scan 6s linear infinite;
    }

    @keyframes scan{
      from{
        transform:translateY(-100px);
      }
      to{
        transform:translateY(100px);
      }
    }

    #hud{
      position:fixed;
      inset:0;
      z-index:3;
      pointer-events:none;
    }

    .panel{
      position:absolute;
      width:260px;
      border:1px solid rgba(0,255,255,0.4);
      background:rgba(0,0,0,0.25);
      backdrop-filter:blur(10px);
      box-shadow:
      0 0 20px rgba(0,255,255,0.2),
      inset 0 0 20px rgba(0,255,255,0.1);
      border-radius:20px;
      padding:18px;
      pointer-events:auto;
    }

    .panel h2{
      font-size:16px;
      margin-bottom:12px;
      color:#6fffff;
    }

    .panel p,
    .panel li{
      color:#cfffff;
      font-size:14px;
      line-height:1.6;
    }

    #leftPanel{
      top:30px;
      left:30px;
    }

    #rightPanel{
      top:30px;
      right:30px;
    }

    #chatPanel{
      bottom:30px;
      right:30px;
      width:320px;
      height:230px;
      display:flex;
      flex-direction:column;
    }

    #messages{
      flex:1;
      overflow:auto;
      margin-bottom:10px;
      padding-right:6px;
    }

    .msg{
      margin-bottom:12px;
      padding:10px;
      border-radius:12px;
      background:rgba(0,255,255,0.08);
    }

    #controls{
      display:flex;
      gap:8px;
    }

    input{
      flex:1;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,255,255,0.3);
      border-radius:12px;
      padding:10px;
      color:white;
      outline:none;
    }

    button{
      background:#00ffff;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:bold;
    }

    .status{
      display:flex;
      justify-content:space-between;
      margin-bottom:8px;
    }

    .pulse{
      width:10px;
      height:10px;
      background:#00ff99;
      border-radius:50%;
      box-shadow:0 0 12px #00ff99;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);opacity:1;}
      50%{transform:scale(1.5);opacity:0.4;}
      100%{transform:scale(1);opacity:1;}
    }

    .voice-bar{
      width:100%;
      height:8px;
      background:rgba(255,255,255,0.1);
      border-radius:20px;
      overflow:hidden;
      margin-top:12px;
    }

    .voice-level{
      height:100%;
      width:30%;
      background:#00ffff;
      box-shadow:0 0 20px cyan;
      animation:voice 1s infinite alternate;
    }

    @keyframes voice{
      from{width:20%;}
      to{width:85%;}
    }

    #title{
      position:absolute;
      top:30px;
      left:50%;
      transform:translateX(-50%);
      font-size:34px;
      letter-spacing:8px;
      color:#77ffff;
      text-shadow:0 0 25px cyan;
      z-index:5;
    }

  </style>
</head>
<body>

<div id="title">ATENA OS</div>

<div class="overlay"></div>

<div id="hud">

  <div class="panel" id="leftPanel">
    <h2>SISTEMA CENTRAL</h2>

    <div class="status">
      <span>ATENA ONLINE</span>
      <div class="pulse"></div>
    </div>

    <p>Classe: Spirit AI</p>
    <p>Energia: 98%</p>
    <p>Estado Emocional: Estável</p>

    <div class="voice-bar">
      <div class="voice-level"></div>
    </div>
  </div>

  <div class="panel" id="rightPanel">
    <h2>COMANDOS</h2>

    <ul>
      <li>scan world</li>
      <li>open archive</li>
      <li>activate portal</li>
      <li>map system</li>
      <li>voice interface</li>
    </ul>
  </div>

  <div class="panel" id="chatPanel">
    <h2>ATENA CHAT</h2>

    <div id="messages">
      <div class="msg">
        Bem-vindo ao núcleo ATENA.
      </div>
    </div>

    <div id="controls">
      <input type="text" id="input" placeholder="Digite um comando...">
      <button id="send">OK</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const textureLoader = new THREE.TextureLoader();

const hologramTexture = textureLoader.load('atena.png');

const geometry = new THREE.PlaneGeometry(3,5);

const material = new THREE.MeshBasicMaterial({
  map:hologramTexture,
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

const hologram = new THREE.Mesh(geometry, material);
scene.add(hologram);

const particlesGeometry = new THREE.BufferGeometry();
const count = 2500;
const positions = new Float32Array(count * 3);

for(let i=0;i<count*3;i++){
  positions[i] = (Math.random()-0.5)*20;
}

particlesGeometry.setAttribute(
  'position',
  new THREE.BufferAttribute(positions,3)
);

const particlesMaterial = new THREE.PointsMaterial({
  color:0x00ffff,
  size:0.03,
  transparent:true,
  opacity:0.8
});

const particles = new THREE.Points(
  particlesGeometry,
  particlesMaterial
);

scene.add(particles);

const light = new THREE.PointLight(0x00ffff,3,100);
light.position.set(0,2,4);
scene.add(light);

function animate(){

  requestAnimationFrame(animate);

  hologram.rotation.y += 0.002;

  hologram.position.y =
  Math.sin(Date.now()*0.001)*0.1;

  particles.rotation.y += 0.0008;

  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{

  camera.aspect =
  window.innerWidth/window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});

const input = document.getElementById('input');
const send = document.getElementById('send');
const messages = document.getElementById('messages');

function addMessage(text){

  const div = document.createElement('div');

  div.className = 'msg';

  div.innerText = text;

  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;
}

send.addEventListener('click',()=>{

  const text = input.value.trim();

  if(!text) return;

  addMessage('> '+text);

  input.value='';

  setTimeout(()=>{

    let response = 'Comando não reconhecido.';

    if(text.includes('portal')){
      response='Portal dimensional preparado.';
    }

    if(text.includes('scan')){
      response='Escaneamento do sistema iniciado.';
    }

    if(text.includes('map')){
      response='Mapa global carregado.';
    }

    if(text.includes('archive')){
      response='Arquivo neural aberto.';
    }

    addMessage('ATENA: '+response);

    speak(response);

  },700);

});

function speak(text){

  const speech = new SpeechSynthesisUtterance(text);

  speech.lang = 'pt-BR';

  speech.rate = 1;

  speech.pitch = 1.1;

  window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
