<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Holographic Dashboard</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #02040a, #000);
  font-family: Arial, sans-serif;
  color: #00f6ff;
}

/* scanlines */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,255,0.05),
    rgba(0,255,255,0.05) 1px,
    transparent 3px,
    transparent 6px
  );
  pointer-events: none;
}

/* container geral */
.dashboard {
  position: absolute;
  inset: 0;
}

/* painéis */
.panel {
  position: absolute;
  border: 1px solid rgba(0,246,255,0.4);
  background: rgba(0,246,255,0.05);
  box-shadow: 0 0 20px rgba(0,246,255,0.2);
  backdrop-filter: blur(6px);
  padding: 12px;
}

/* títulos */
.title {
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.8;
  margin-bottom: 8px;
}

/* barras de energia */
.bar {
  height: 8px;
  background: rgba(0,246,255,0.15);
  margin: 6px 0;
  overflow: hidden;
  border-radius: 4px;
}

.bar > div {
  height: 100%;
  width: 70%;
  background: #00f6ff;
  box-shadow: 0 0 10px #00f6ff;
  animation: load 2s infinite alternate;
}

/* animação barras */
@keyframes load {
  from { width: 40%; }
  to { width: 95%; }
}

/* partículas */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #00f6ff;
  border-radius: 50%;
  opacity: 0.5;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(0); opacity: 0.8; }
  to { transform: translateY(-800px); opacity: 0; }
}

/* layout dos painéis */
#p1 { top: 40px; left: 40px; width: 220px; }
#p2 { top: 40px; right: 40px; width: 220px; }
#p3 { bottom: 40px; left: 40px; width: 300px; }
#p4 { bottom: 40px; right: 40px; width: 300px; }

.centerCore {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 2px solid #00f6ff;
  box-shadow: 0 0 30px #00f6ff;
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="centerCore"></div>

  <div class="panel" id="p1">
    <div class="title">ENERGIA DO SISTEMA</div>
    <div class="bar"><div></div></div>
    <div class="bar"><div style="width:60%"></div></div>
    <div class="bar"><div style="width:85%"></div></div>
  </div>

  <div class="panel" id="p2">
    <div class="title">PROCESSAMENTO IA</div>
    <div class="bar"><div></div></div>
    <div class="bar"><div style="width:80%"></div></div>
    <div class="bar"><div style="width:50%"></div></div>
  </div>

  <div class="panel" id="p3">
    <div class="title">SENSORES ATIVOS</div>
    <div>• MOVIMENTO: OK</div>
    <div>• AUDIO: OK</div>
    <div>• REDE: ESTÁVEL</div>
  </div>

  <div class="panel" id="p4">
    <div class="title">DIAGNÓSTICO</div>
    <div>STATUS: ONLINE</div>
    <div>CORE: ESTÁVEL</div>
    <div>Holograma: ativo</div>
  </div>

</div>

<script>
// partículas de fundo
for (let i = 0; i < 60; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  document.body.appendChild(p);

  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.top = Math.random() * window.innerHeight + "px";
  p.style.animationDuration = (3 + Math.random() * 6) + "s";
}
</script>

</body>
</html>
