<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATENA • Spirit Hologram</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#02040a;
    font-family:Arial, Helvetica, sans-serif;
}

/* ===== HUD ===== */

#hud{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:5;
}

.title{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    color:#77ffff;
    font-size:34px;
    letter-spacing:8px;
    text-shadow:0 0 25px cyan;
}

.panel{
    position:absolute;
    width:260px;
    border:1px solid rgba(0,255,255,0.25);
    background:rgba(0,0,0,0.2);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:18px;
    color:#bff;
    box-shadow:
    0 0 20px rgba(0,255,255,0.15),
    inset 0 0 20px rgba(0,255,255,0.05);
}

.left{
    left:25px;
    top:25px;
}

.right{
    right:25px;
    top:25px;
}

.panel h2{
    margin-bottom:12px;
    color:#7fffff;
    font-size:15px;
}

.panel p{
    margin-bottom:8px;
    font-size:13px;
}

.voice{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.voice span{
    display:block;
    height:100%;
    width:40%;
    background:#00ffff;
    box-shadow:0 0 20px cyan;
    animation:voice 1s infinite alternate;
}

@keyframes voice{
    from{ width:20%; }
    to{ width:85%; }
}

/* ===== scanlines ===== */

.overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:10;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 4px
    );
    mix-blend-mode:screen;
}

/* ===== aura glow ===== */

.glow{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:radial-gradient(circle,
    rgba(0,255,255,0.18),
    transparent 70%);
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    filter:blur(40px);
    animation:pulse 4s infinite ease-in-out;
}

@keyframes pulse{
    0%{
        transform:translate(-50%,-50%) scale(1);
        opacity:.7;
    }

    50%{
        transform:translate(-50%,-50%) scale(1.2);
        opacity:1;
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
        opacity:.7;
    }
}

</style>
</head>

<body>

<div class="glow"></div>

<div id="hud">

    <div class="title">
        ATENA OS
    </div>

    <div class="panel left">
        <h2>SPIRIT CORE</h2>

        <p>STATUS: ONLINE</p>
        <p>ENTITY: ATENA</p>
        <p>MODE: HOLOGRAPHIC</p>
        <p>EMOTION: CALM</p>

        <div class="voice">
            <span></span>
        </div>
    </div>

    <div class="panel right">
        <h2>COMMANDS</h2>

        <p>> scan world</p>
        <p>> activate portal</p>
        <p>> neural archive</p>
        <p>> AI interface</p>
        <p>> spirit protocol</p>
    </div>

</div>

<div class="overlay"></div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(0x02040a, 0.08);

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

/* =========================
LIGHTS
========================= */

const light = new THREE.PointLight(0x00ffff, 8, 100);

light.position.set(0,2,4);

scene.add(light);

const ambient = new THREE.AmbientLight(0x66ffff, 1);

scene.add(ambient);

/* =========================
SPIRIT GROUP
========================= */

const spirit = new THREE.Group();

scene.add(spirit);

/* =========================
HEAD
========================= */

const headGeo = new THREE.SphereGeometry(0.7, 64, 64);

const holoMat = new THREE.MeshPhysicalMaterial({

    color:0x66ffff,
    emissive:0x00ffff,
    emissiveIntensity:2,

    transparent:true,
    opacity:0.35,

    roughness:0,
    metalness:0,

    transmission:1,

    depthWrite:false,
    wireframe:false

});

const head = new THREE.Mesh(headGeo, holoMat);

head.position.y = 1.4;

spirit.add(head);

/* =========================
BODY
========================= */

const bodyGeo = new THREE.CylinderGeometry(
    0.7,
    1.2,
    2.8,
    32,
    32,
    true
);

const body = new THREE.Mesh(bodyGeo, holoMat);

body.position.y = -0.5;

spirit.add(body);

/* =========================
ENERGY RINGS
========================= */

for(let i=0;i<5;i++){

    const ringGeo = new THREE.TorusGeometry(
        1.2 + i*0.15,
        0.01,
        16,
        100
    );

    const ringMat = new THREE.MeshBasicMaterial({

        color:0x00ffff,
        transparent:true,
        opacity:0.5

    });

    const ring = new THREE.Mesh(ringGeo, ringMat);

    ring.rotation.x = Math.PI / 2;

    ring.position.y = -1 + i*0.4;

    spirit.add(ring);
}

/* =========================
EYES
========================= */

function createEye(x){

    const geo = new THREE.SphereGeometry(0.06,16,16);

    const mat = new THREE.MeshBasicMaterial({
        color:0xffffff
    });

    const eye = new THREE.Mesh(geo,mat);

    eye.position.set(x,1.45,0.62);

    spirit.add(eye);

    return eye;
}

const eyeL = createEye(-0.18);
const eyeR = createEye(0.18);

/* =========================
PARTICLES
========================= */

const particlesCount = 12000;

const positions = new Float32Array(
    particlesCount * 3
);

for(let i=0;i<particlesCount*3;i++){

    positions[i] =
    (Math.random()-0.5) * 18;
}

const particlesGeo = new THREE.BufferGeometry();

particlesGeo.setAttribute(
    'position',
    new THREE.BufferAttribute(positions,3)
);

const particlesMat = new THREE.PointsMaterial({

    color:0x00ffff,
    size:0.025,
    transparent:true,
    opacity:0.8

});

const particles = new THREE.Points(
    particlesGeo,
    particlesMat
);

scene.add(particles);

/* =========================
ENERGY FLOW
========================= */

const energyGeo = new THREE.BufferGeometry();

const energyCount = 3000;

const energyPositions = new Float32Array(
    energyCount * 3
);

for(let i=0;i<energyCount;i++){

    const i3 = i*3;

    energyPositions[i3] =
    (Math.random()-0.5)*2;

    energyPositions[i3+1] =
    (Math.random()*5)-2;

    energyPositions[i3+2] =
    (Math.random()-0.5)*2;
}

energyGeo.setAttribute(
    'position',
    new THREE.BufferAttribute(
        energyPositions,
        3
    )
);

const energyMat = new THREE.PointsMaterial({

    color:0xffffff,
    size:0.02,
    transparent:true,
    opacity:0.8

});

const energy = new THREE.Points(
    energyGeo,
    energyMat
);

spirit.add(energy);

/* =========================
AUDIO REACTION
========================= */

let audioLevel = 0;

window.addEventListener('mousemove',(e)=>{

    audioLevel =
    e.clientX / window.innerWidth;
});

/* =========================
ANIMATION
========================= */

const clock = new THREE.Clock();

function animate(){

    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    /* FLOAT */

    spirit.position.y =
    Math.sin(t*1.2)*0.15;

    /* BREATH */

    spirit.scale.y =
    1 + Math.sin(t*2)*0.02;

    /* HEAD */

    head.rotation.y =
    Math.sin(t*0.8)*0.2;

    head.rotation.x =
    Math.sin(t*1.4)*0.06;

    /* EYES */

    const eyeGlow =
    1 + audioLevel * 5;

    eyeL.scale.setScalar(eyeGlow);
    eyeR.scale.setScalar(eyeGlow);

    /* BRIGHTNESS */

    holoMat.emissiveIntensity =
    2 + Math.sin(t*4)*0.5
    + audioLevel * 3;

    /* PARTICLES */

    particles.rotation.y += 0.0008;

    energy.rotation.y -= 0.004;

    /* BODY DISTORTION */

    body.rotation.z =
    Math.sin(t)*0.02;

    renderer.render(scene,camera);
}

animate();

/* =========================
RESIZE
========================= */

window.addEventListener('resize',()=>{

    camera.aspect =
    window.innerWidth /
    window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
