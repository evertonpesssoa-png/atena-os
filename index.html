<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Túnel Dimensional - Portal Astral</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:'Courier New',monospace;
}

#loading{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#00ffff;
    font-size:20px;
    letter-spacing:3px;
    z-index:100;
    background:#000;
    text-shadow:0 0 10px #00ffff;
    animation:pulse 1.5s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.5;}
}

#progress-bar{
    width:300px;
    height:2px;
    background:rgba(0,255,255,0.2);
    margin-top:20px;
    overflow:hidden;
}

#progress-fill{
    width:0%;
    height:100%;
    background:#00ffff;
    box-shadow:0 0 10px #00ffff;
    transition:width 0.3s ease;
}

#instructions{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
    color:rgba(0,255,255,0.6);
    font-size:12px;
    font-family:monospace;
    z-index:10;
    pointer-events:none;
    letter-spacing:2px;
}

#fps-counter{
    position:fixed;
    top:20px;
    right:20px;
    color:rgba(0,255,255,0.6);
    font-size:10px;
    font-family:monospace;
    z-index:10;
    background:rgba(0,0,0,0.5);
    padding:4px 8px;
    border-radius:4px;
}

#audio-control{
    position:fixed;
    bottom:20px;
    right:20px;
    background:rgba(0,0,0,0.7);
    color:#00ffff;
    border:1px solid #00ffff;
    padding:8px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
    z-index:10;
    font-family:monospace;
    transition:all 0.3s;
}

#audio-control:hover{
    background:#00ffff;
    color:#000;
    box-shadow:0 0 15px #00ffff;
}

#music-info{
    position:fixed;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.7);
    color:rgba(0,255,255,0.6);
    border:1px solid rgba(0,255,255,0.3);
    padding:4px 8px;
    border-radius:4px;
    font-size:10px;
    font-family:monospace;
    z-index:10;
}
</style>
</head>

<body>

<div id="loading">
    <div>✦ CONECTANDO À DIMENSÃO ✦</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div style="font-size:12px; margin-top:10px;">asura: <span id="asura-name"></span></div>
    <div style="font-size:10px; margin-top:5px;">carregando áudio...</div>
</div>
<div id="instructions">⚡ VIAGEM DIMENSIONAL EM PROGRESSO ⚡</div>
<div id="fps-counter">FPS: --</div>
<div id="audio-control">🔊 ATIVAR ÁUDIO</div>
<div id="music-info">🎵 aguardando música...</div>

<script type="importmap">
{
  "imports": {
    "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from "three";

// ============================================
// ⚡ CONFIGURAÇÃO DA MÚSICA ⚡
// ALTERE ESTA LINHA PARA O NOME DO SEU ARQUIVO:
// ============================================
const MUSIC_FILE = "sound/sua-musica.mp3";  // 👈 MUDE AQUI!
// ============================================

const params = new URLSearchParams(window.location.search);
const asura = params.get("asura") || "astreia";

document.getElementById("asura-name").textContent = asura;
document.getElementById("music-info").innerHTML = `🎵 carregando: ${MUSIC_FILE.split('/').pop()}`;

// Sistema de Áudio com duração dinâmica
let audioContext = null;
let audioBuffer = null;
let audioSource = null;
let gainNode = null;
let isAudioPlaying = false;
let musicDuration = 15000;
let startTime = null;
let transitionProgress = 0;

// Função para carregar música da pasta sound/
async function loadMusic() {
    try {
        console.log(`Carregando música de: ${MUSIC_FILE}`);
        const response = await fetch(MUSIC_FILE);
        
        if(!response.ok) {
            throw new Error(`Arquivo não encontrado: ${MUSIC_FILE}`);
        }
        
        const arrayBuffer = await response.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        musicDuration = audioBuffer.duration * 1000;
        
        const fileName = MUSIC_FILE.split('/').pop();
        document.getElementById("music-info").innerHTML = `🎵 ${fileName} | ${audioBuffer.duration.toFixed(1)}s`;
        
        console.log(`✅ Música carregada! Duração: ${musicDuration}ms`);
        
        playMusic();
        
    } catch(error) {
        console.error("❌ Erro ao carregar música:", error);
        document.getElementById("music-info").innerHTML = `⚠️ erro: ${MUSIC_FILE} não encontrado`;
        generateSynthesizedMusic();
    }
}

// Gerar música sintetizada (fallback)
function generateSynthesizedMusic() {
    const sampleRate = audioContext.sampleRate;
    const duration = 15;
    const frameCount = sampleRate * duration;
    const buffer = audioContext.createBuffer(2, frameCount, sampleRate);
    
    for(let channel = 0; channel < 2; channel++) {
        const channelData = buffer.getChannelData(channel);
        
        for(let i = 0; i < frameCount; i++) {
            const t = i / sampleRate;
            const melody = 
                Math.sin(2 * Math.PI * 440 * t) * 0.3 * Math.exp(-t * 0.2) +
                Math.sin(2 * Math.PI * 329.63 * t) * 0.2 * Math.sin(t * 5) +
                Math.sin(2 * Math.PI * 369.99 * t * 1.5) * 0.15;
            
            const beat = Math.sin(2 * Math.PI * 2 * t) * 0.1 * (Math.sin(t * Math.PI * 4) > 0 ? 1 : 0);
            channelData[i] = (melody + beat) * 0.5;
        }
    }
    
    audioBuffer = buffer;
    musicDuration = duration * 1000;
    document.getElementById("music-info").innerHTML = `🎵 sintetizada | ${duration}s (fallback)`;
    playMusic();
}

function playMusic() {
    if(!audioContext || !audioBuffer) return;
    
    if(audioSource) {
        try { audioSource.stop(); } catch(e) {}
    }
    
    audioSource = audioContext.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.loop = false;
    
    gainNode = audioContext.createGain();
    gainNode.gain.value = 0.3;
    
    audioSource.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    audioSource.start();
    startTime = performance.now();
    isAudioPlaying = true;
    
    const fadeOutStart = musicDuration - 1000;
    setTimeout(() => {
        if(gainNode) {
            gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1);
        }
    }, fadeOutStart);
    
    console.log(`🎬 Música iniciada! Duração: ${musicDuration}ms`);
}

async function initAudio() {
    if(audioContext) return;
    
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await loadMusic();
}

// Evento para ativar áudio
document.getElementById("audio-control").addEventListener("click", async () => {
    if(!audioContext) {
        await initAudio();
        document.getElementById("audio-control").innerHTML = "🔊 ÁUDIO ATIVO";
        document.getElementById("audio-control").style.opacity = "0.5";
    } else if(audioContext.state === "suspended") {
        await audioContext.resume();
        if(!isAudioPlaying && audioBuffer) {
            playMusic();
        }
        document.getElementById("audio-control").innerHTML = "🔊 ÁUDIO ATIVO";
    }
});

// Inicializar Three.js
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.003);

const camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Túnel com anéis
const tunnelRings = [];
const ringCount = 180;
const ringSpacing = 6;
const colors = [0x00ffff, 0xff00ff, 0xff6600, 0x00ff88];

for(let i = 0; i < ringCount; i++) {
    const geometry = new THREE.TorusGeometry(2.8, 0.08, 32, 120);
    const color = colors[i % colors.length];
    const material = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.5,
        metalness: 0.8,
        roughness: 0.2
    });
    
    const ring = new THREE.Mesh(geometry, material);
    ring.position.z = -i * ringSpacing;
    ring.rotation.x = Math.PI / 2;
    
    const innerRingGeo = new THREE.TorusGeometry(2.2, 0.05, 32, 120);
    const innerRing = new THREE.Mesh(innerRingGeo, material);
    innerRing.position.z = -i * ringSpacing;
    innerRing.rotation.x = Math.PI / 2;
    
    tunnelRings.push({ outer: ring, inner: innerRing });
    scene.add(ring);
    scene.add(innerRing);
}

// Partículas
const particleCount = 8000;
const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colorsArray = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount; i++) {
    const radius = Math.random() * 4;
    const angle = Math.random() * Math.PI * 2;
    positions[i*3] = Math.cos(angle) * radius;
    positions[i*3+1] = Math.sin(angle) * radius;
    positions[i*3+2] = -Math.random() * 1200;
    
    const colorChoice = colors[Math.floor(Math.random() * colors.length)];
    const r = ((colorChoice >> 16) & 255) / 255;
    const g = ((colorChoice >> 8) & 255) / 255;
    const b = (colorChoice & 255) / 255;
    colorsArray[i*3] = r;
    colorsArray[i*3+1] = g;
    colorsArray[i*3+2] = b;
}

particleGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute("color", new THREE.BufferAttribute(colorsArray, 3));

const particleMaterial = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending
});

const stars = new THREE.Points(particleGeometry, particleMaterial);
scene.add(stars);

// Luzes
const ambientLight = new THREE.AmbientLight(0x111111);
scene.add(ambientLight);

const backLight = new THREE.PointLight(0x00ffff, 1, 50);
backLight.position.set(0, 0, -10);
scene.add(backLight);

const colorLight = new THREE.PointLight(0xff00ff, 0.5);
colorLight.position.set(2, 2, -5);
scene.add(colorLight);

// Portal
const portalGroup = new THREE.Group();
const portalGeometry = new THREE.SphereGeometry(1.5, 64, 64);
const portalMaterial = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0x44aaff,
    emissiveIntensity: 1,
    transparent: true,
    opacity: 0.8,
    metalness: 0.9,
    roughness: 0.1
});

const portalCore = new THREE.Mesh(portalGeometry, portalMaterial);
portalGroup.add(portalCore);

const energyRingGeo = new THREE.TorusGeometry(1.8, 0.05, 64, 200);
const energyRingMat = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    emissive: 0x00ffff,
    emissiveIntensity: 1
});
const energyRing = new THREE.Mesh(energyRingGeo, energyRingMat);
portalGroup.add(energyRing);

portalGroup.position.z = -950;
scene.add(portalGroup);

// Animação
let speed = 3.5;
let frameCount_fps = 0;
let lastTime = performance.now();
let hasTransitioned = false;

function animate() {
    requestAnimationFrame(animate);
    
    frameCount_fps++;
    const now = performance.now();
    if(now - lastTime >= 1000) {
        document.getElementById("fps-counter").textContent = `FPS: ${frameCount_fps}`;
        frameCount_fps = 0;
        lastTime = now;
    }
    
    if(isAudioPlaying && startTime) {
        const elapsed = now - startTime;
        transitionProgress = Math.min(elapsed / musicDuration, 1.2);
        
        const fillPercent = Math.min((elapsed / musicDuration) * 100, 100);
        document.getElementById("progress-fill").style.width = fillPercent + "%";
        
        if(transitionProgress > 0.7) {
            const intensity = (transitionProgress - 0.7) * 3;
            portalMaterial.emissiveIntensity = 1 + intensity;
            portalMaterial.opacity = 0.8 + intensity * 0.2;
            
            const scale = 1 + Math.min((transitionProgress - 0.7) * 5, 3);
            portalGroup.scale.setScalar(scale);
            
            speed = 3.5 + (transitionProgress - 0.7) * 12;
            
            backLight.intensity = 1 + Math.sin(now * 0.02) * 0.5;
            colorLight.intensity = 0.5 + Math.sin(now * 0.03) * 0.3;
        }
        
        if(transitionProgress >= 1 && !hasTransitioned) {
            hasTransitioned = true;
            
            const flashOverlay = document.createElement('div');
            flashOverlay.style.position = 'fixed';
            flashOverlay.style.inset = '0';
            flashOverlay.style.background = 'white';
            flashOverlay.style.zIndex = '1000';
            flashOverlay.style.opacity = '0';
            flashOverlay.style.transition = 'opacity 0.3s';
            document.body.appendChild(flashOverlay);
            
            setTimeout(() => {
                flashOverlay.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = `worlds/${asura}.html`;
                }, 300);
            }, 100);
        }
    }
    
    tunnelRings.forEach((item) => {
        item.outer.position.z += speed;
        item.inner.position.z += speed;
        
        item.outer.rotation.z += 0.01;
        item.inner.rotation.z -= 0.008;
        item.outer.rotation.y += 0.005;
        item.inner.rotation.y -= 0.003;
        
        if(item.outer.position.z > 8) {
            item.outer.position.z = -ringCount * ringSpacing;
            item.inner.position.z = -ringCount * ringSpacing;
        }
    });
    
    const particlePositions = particleGeometry.attributes.position.array;
    for(let i = 0; i < particleCount; i++) {
        particlePositions[i*3+2] += speed * 1.5;
        
        if(particlePositions[i*3+2] > 5) {
            particlePositions[i*3+2] = -1200;
            const radius = Math.random() * 4;
            const angle = Math.random() * Math.PI * 2;
            particlePositions[i*3] = Math.cos(angle) * radius;
            particlePositions[i*3+1] = Math.sin(angle) * radius;
        }
    }
    particleGeometry.attributes.position.needsUpdate = true;
    
    energyRing.rotation.z += 0.02;
    energyRing.rotation.x += 0.01;
    energyRing.rotation.y += 0.015;
    
    renderer.render(scene, camera);
}

animate();

document.addEventListener('mousemove', (event) => {
    const x = (event.clientX / window.innerWidth - 0.5) * 0.5;
    const y = (event.clientY / window.innerHeight - 0.5) * 0.3;
    camera.position.x += (x * 0.5 - camera.position.x) * 0.05;
    camera.position.y += (-y * 0.3 - camera.position.y) * 0.05;
});

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

setTimeout(() => {
    document.getElementById("loading").style.opacity = "0";
    setTimeout(() => {
        document.getElementById("loading").style.display = "none";
    }, 500);
}, 1500);

console.log(`✨ Portal dimensional ativado para: ${asura}`);
console.log(`🎵 Música: ${MUSIC_FILE}`);

</script>

</body>
</html>
