<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCI-FI GAMER HUD - Painel de Nave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: #000000;
        }

        /* ============================================================ */
        /* HUD GAMER SCI-FI - FUNDO 100% PRETO */
        /* ============================================================ */
        
        .hud-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            pointer-events: none;
        }

        /* Scanlines (linhas de varredura) */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.02) 0px,
                rgba(0, 255, 255, 0.02) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 60;
        }

        /* Vignette (escurece bordas) */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 55;
        }

        /* ============================================================ */
        /* BARRA SUPERIOR GAMER */
        /* ============================================================ */
        .hud-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,20,30,0.8) 100%);
            border-bottom: 1px solid #00ffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            backdrop-filter: blur(4px);
            z-index: 70;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .hud-logo {
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 4px;
            text-shadow: 0 0 5px #00ffff;
            font-weight: bold;
        }

        .hud-logo span {
            color: #ff44ff;
            text-shadow: 0 0 5px #ff44ff;
        }

        .hud-stats {
            display: flex;
            gap: 30px;
        }

        .hud-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-stat-label {
            color: #88aaff;
            font-size: 8px;
            letter-spacing: 1px;
        }

        .hud-stat-value {
            color: #00ffff;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
        }

        .hud-time {
            color: #ff44ff;
            font-size: 14px;
            font-family: monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #ff44ff;
        }

        /* ============================================================ */
        /* BARRAS DE STATUS (HP, STAMINA, SHIELD) */
        /* ============================================================ */
        .status-bars {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 280px;
            z-index: 70;
        }

        .status-bar {
            margin-bottom: 12px;
        }

        .status-label {
            display: flex;
            justify-content: space-between;
            color: #88aaff;
            font-size: 9px;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .bar-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .bar-fill.hp { background: linear-gradient(90deg, #ff3366, #ff6644); box-shadow: 0 0 5px #ff3366; width: 87%; }
        .bar-fill.shield { background: linear-gradient(90deg, #33aaff, #44ffff); box-shadow: 0 0 5px #33aaff; width: 92%; }
        .bar-fill.stamina { background: linear-gradient(90deg, #44ff88, #aaff44); box-shadow: 0 0 5px #44ff88; width: 76%; }

        /* ============================================================ */
        /* MIRA CENTRAL (GAMER) */
        /* ============================================================ */
        .hud-crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            z-index: 70;
        }
        .crosshair-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 1px solid #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff, inset 0 0 5px #00ffff;
            animation: pulseRing 1.5s ease-in-out infinite;
        }
        .crosshair-line {
            position: absolute;
            background: #ff44ff;
            box-shadow: 0 0 4px #ff44ff;
        }
        .crosshair-h {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            transform: translateY(-50%);
        }
        .crosshair-v {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            transform: translateX(-50%);
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ffff;
        }
        .crosshair-corners {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: #00ffff;
            border-style: solid;
        }
        .corner-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .corner-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* ============================================================ */
        /* RADAR CIRCULAR */
        /* ============================================================ */
        .hud-radar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            z-index: 70;
        }
        .radar-sweep {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(0,255,255,0.15) 360deg);
            animation: sweep 3s linear infinite;
        }
        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ffff;
        }
        .radar-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .radar-blip {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ff44ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff44ff;
            animation: blipPulse 1s infinite;
        }

        /* ============================================================ */
        /* DADOS LATERAIS (AMMO, SPEED, ETC) */
        /* ============================================================ */
        .hud-data-left {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 15px 20px;
            border-left: 3px solid #00ffff;
            z-index: 70;
            font-family: monospace;
        }
        .hud-data-left div {
            color: #88aaff;
            font-size: 10px;
            margin: 6px 0;
            letter-spacing: 1px;
        }
        .hud-data-left .value {
            color: #00ffff;
            font-size: 18px;
            font-weight: bold;
        }

        .hud-data-right {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 15px 20px;
            border-right: 3px solid #ff44ff;
            text-align: right;
            z-index: 70;
        }
        .hud-data-right div {
            color: #88aaff;
            font-size: 10px;
            margin: 6px 0;
        }
        .hud-data-right .value {
            color: #ff44ff;
            font-size: 18px;
            font-weight: bold;
        }

        /* ============================================================ */
        /* BARRA INFERIOR (STATUS DO SISTEMA) */
        /* ============================================================ */
        .hud-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35px;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,20,30,0.8) 100%);
            border-top: 1px solid #ff44ff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            z-index: 70;
        }
        .hud-bottom-item {
            color: #88aaff;
            font-size: 10px;
            letter-spacing: 2px;
        }
        .hud-bottom-item .online {
            color: #44ff88;
            text-shadow: 0 0 3px #44ff88;
        }
        .hud-bottom-item .warning {
            color: #ffaa44;
            animation: blink 0.5s infinite;
        }

        /* ============================================================ */
        /* ANIMAÇÕES */
        /* ============================================================ */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes blipPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.5); }
        }
        @keyframes pulseRing {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Loading */
        #loading {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-family: monospace;
            z-index: 200;
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px solid #00ffff;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #00ffff; }
            50% { opacity: 0.6; box-shadow: 0 0 30px #00ffff; }
        }

        /* Botão tela cheia */
        .fullscreen-btn {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #00ffff;
            color: #00ffff;
            font-family: monospace;
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 80;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>
<body>
    <!-- HUD GAMER SCI-FI -->
    <div class="hud-container">
        <div class="scanlines"></div>
        <div class="vignette"></div>
        
        <!-- Barra superior -->
        <div class="hud-top-bar">
            <div class="hud-logo">✦ <span>NOVA</span> ARK ✦</div>
            <div class="hud-stats">
                <div class="hud-stat">
                    <div class="hud-stat-label">FPS</div>
                    <div class="hud-stat-value" id="fpsVal">144</div>
                </div>
                <div class="hud-stat">
                    <div class="hud-stat-label">PING</div>
                    <div class="hud-stat-value" id="pingVal">12</div>
                </div>
            </div>
            <div class="hud-time" id="hudClock">00:00:00</div>
        </div>
        
        <!-- Barras de status (HP, Shield, Stamina) -->
        <div class="status-bars">
            <div class="status-bar">
                <div class="status-label"><span>🛡️ SHIELD SISTEMA</span><span id="shieldPercent">92</span>%</div>
                <div class="bar-container"><div class="bar-fill shield" id="shieldBar" style="width: 92%"></div></div>
            </div>
            <div class="status-bar">
                <div class="status-label"><span>❤️ INTEGRIDADE</span><span id="hpPercent">87</span>%</div>
                <div class="bar-container"><div class="bar-fill hp" id="hpBar" style="width: 87%"></div></div>
            </div>
            <div class="status-bar">
                <div class="status-label"><span>⚡ ENERGIA</span><span id="staminaPercent">76</span>%</div>
                <div class="bar-container"><div class="bar-fill stamina" id="staminaBar" style="width: 76%"></div></div>
            </div>
        </div>
        
        <!-- Mira central GAMER -->
        <div class="hud-crosshair">
            <div class="crosshair-ring"></div>
            <div class="crosshair-line crosshair-h"></div>
            <div class="crosshair-line crosshair-v"></div>
            <div class="crosshair-dot"></div>
            <div class="crosshair-corners">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
            </div>
        </div>
        
        <!-- Radar -->
        <div class="hud-radar">
            <div class="radar-sweep"></div>
            <div class="radar-grid"></div>
            <div class="radar-center"></div>
            <div class="radar-blip" style="top: 25%; left: 60%;"></div>
            <div class="radar-blip" style="top: 70%; left: 30%; animation-delay: 0.5s;"></div>
            <div class="radar-blip" style="top: 45%; left: 75%; animation-delay: 1s;"></div>
            <div class="radar-blip" style="top: 15%; left: 20%; animation-delay: 1.5s;"></div>
        </div>
        
        <!-- Dados laterais -->
        <div class="hud-data-left">
            <div>VELOCIDADE</div>
            <div class="value" id="speedVal">2,384</div>
            <div>KM/H</div>
            <div style="margin-top: 12px;">ALTITUDE</div>
            <div class="value" id="altVal">42,817</div>
            <div>METROS</div>
        </div>
        
        <div class="hud-data-right">
            <div>MUNIÇÃO</div>
            <div class="value" id="ammoVal">∞</div>
            <div>ENERGIA</div>
            <div class="value" id="energyVal">847</div>
            <div>GW</div>
        </div>
        
        <!-- Barra inferior -->
        <div class="hud-bottom-bar">
            <div class="hud-bottom-item">✦ SISTEMA: <span class="online">OPERACIONAL</span></div>
            <div class="hud-bottom-item">✦ HOLOGRAM: <span class="online">ATIVO</span></div>
            <div class="hud-bottom-item">✦ LINK: <span class="online">ESTÁVEL</span></div>
            <div class="hud-bottom-item"><span class="warning">⚠</span> MARGEM: SEGURA</div>
        </div>
        
        <button class="fullscreen-btn" id="fullscreenBtn">🔲 TELA CHEIA</button>
    </div>
    
    <div id="loading">🔷 INICIALIZANDO HOLOGRAMA... 🔷</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ============================================================
        // RELÓGIO E DADOS HUD
        // ============================================================
        function updateHUDClock() {
            const now = new Date();
            const hours = String(now.getUTCHours()).padStart(2, '0');
            const minutes = String(now.getUTCMinutes()).padStart(2, '0');
            const seconds = String(now.getUTCSeconds()).padStart(2, '0');
            document.getElementById('hudClock').textContent = `${hours}:${minutes}:${seconds} UTC`;
        }
        updateHUDClock();
        setInterval(updateHUDClock, 1000);
        
        // Simular telemetria
        let hudTime = 0;
        setInterval(() => {
            hudTime += 0.3;
            const speed = 2384 + Math.sin(hudTime) * 50;
            const alt = 42817 + Math.sin(hudTime * 0.7) * 120;
            const energy = 847 + Math.sin(hudTime * 0.5) * 8;
            const shield = 92 + Math.sin(hudTime * 0.4) * 3;
            const hp = 87 + Math.sin(hudTime * 0.3) * 2;
            const stamina = 76 + Math.sin(hudTime * 0.6) * 4;
            
            document.getElementById('speedVal').textContent = Math.floor(speed).toLocaleString();
            document.getElementById('altVal').textContent = Math.floor(alt).toLocaleString();
            document.getElementById('energyVal').textContent = Math.floor(energy);
            document.getElementById('shieldPercent').textContent = Math.floor(shield);
            document.getElementById('hpPercent').textContent = Math.floor(hp);
            document.getElementById('staminaPercent').textContent = Math.floor(stamina);
            
            document.getElementById('shieldBar').style.width = Math.floor(shield) + '%';
            document.getElementById('hpBar').style.width = Math.floor(hp) + '%';
            document.getElementById('staminaBar').style.width = Math.floor(stamina) + '%';
            
            // FPS e Ping simulados
            document.getElementById('fpsVal').textContent = 120 + Math.floor(Math.sin(hudTime * 2) * 15);
            document.getElementById('pingVal').textContent = 12 + Math.floor(Math.sin(hudTime * 1.5) * 3);
        }, 300);
        
        // ============================================================
        // TELA CHEIA
        // ============================================================
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.innerHTML = '🔳 SAIR';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '🔲 TELA CHEIA';
            }
        }
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        
        // ============================================================
        // THREE.JS - CENA 100% PRETA
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.9, 3.8);
        camera.lookAt(0, 0.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Efeito Bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.2, 0.5, 0.15
        );
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
        }, 800);

        // ============================================================
        // LUZES
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        const backLight = new THREE.PointLight(0x4466ff, 0.4);
        backLight.position.set(0, 1.2, -2);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0x00ffff, 0.3);
        rimLight.position.set(1, 1.8, 1.5);
        scene.add(rimLight);

        // Grade holográfica
        const gridHelper = new THREE.GridHelper(8, 20, 0x33aaff, 0x2266aa);
        gridHelper.position.y = -0.9;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.15;
        scene.add(gridHelper);
        
        // Anéis decorativos
        const ringOuterGeo = new THREE.TorusGeometry(2.0, 0.03, 64, 200);
        const ringOuterMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2266aa, emissiveIntensity: 0.5, transparent: true, opacity: 0.5 });
        const ringOuter = new THREE.Mesh(ringOuterGeo, ringOuterMat);
        ringOuter.rotation.x = Math.PI / 2;
        ringOuter.position.y = -0.6;
        scene.add(ringOuter);
        
        const ringInnerGeo = new THREE.TorusGeometry(1.4, 0.02, 64, 200);
        const ringInnerMat = new THREE.MeshStandardMaterial({ color: 0xff44ff, emissive: 0xff2288, emissiveIntensity: 0.4, transparent: true, opacity: 0.4 });
        const ringInner = new THREE.Mesh(ringInnerGeo, ringInnerMat);
        ringInner.rotation.x = Math.PI / 2;
        ringInner.position.y = -0.6;
        scene.add(ringInner);
        
        // Partículas flutuantes
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 10;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 5 + 0.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 7;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0x66ccff, size: 0.02, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // ============================================================
        // CARD HOLOGRÁFICO PRINCIPAL
        // ============================================================
        const cardWidth = 2.5;
        const cardHeight = 3.3;
        
        const cardGeometry = new THREE.BoxGeometry(cardWidth, cardHeight, 0.08);
        const cardMaterial = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x2266aa, emissiveIntensity: 0.08, metalness: 0.85, roughness: 0.25, transparent: true, opacity: 0.2 });
        const card = new THREE.Mesh(cardGeometry, cardMaterial);
        card.position.set(0, 0.65, 0);
        scene.add(card);
        
        const edgeGeometry = new THREE.BoxGeometry(cardWidth + 0.08, cardHeight + 0.08, 0.02);
        const edgeMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.6, transparent: true, opacity: 0.8 });
        const edgeBorder = new THREE.Mesh(edgeGeometry, edgeMaterial);
        edgeBorder.position.set(0, 0.65, 0.045);
