<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma - Contorno da Mulher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            overflow: hidden;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #instrucoes {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: #3399ff;
            background: rgba(0,0,0,0.5);
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instrucoes">
        🖱️ Use o dedo para girar | 🔵 Contorno da silhueta em pontos azuis
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ======================
        // CENA
        // ======================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        // ======================
        // CÂMERA
        // ======================
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 4.5);
        
        // ======================
        // RENDERER
        // ======================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // ======================
        // CONTROLES
        // ======================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1, 0);
        
        // ======================
        // FUNÇÃO PARA DETECTAR BORDAS (CONTORNO)
        // ======================
        function isEdge(data, x, y, width, height, threshold = 80) {
            const index = (y * width + x) * 4;
            const brightness = data[index] + data[index+1] + data[index+2];
            
            // Se o pixel atual é escuro, não é borda
            if (brightness < threshold) return false;
            
            // Verifica os 4 vizinhos (cima, baixo, esquerda, direita)
            const neighbors = [];
            
            if (y > 0) {
                const upIndex = ((y-1) * width + x) * 4;
                neighbors.push(data[upIndex] + data[upIndex+1] + data[upIndex+2]);
            }
            if (y < height - 1) {
                const downIndex = ((y+1) * width + x) * 4;
                neighbors.push(data[downIndex] + data[downIndex+1] + data[downIndex+2]);
            }
            if (x > 0) {
                const leftIndex = (y * width + (x-1)) * 4;
                neighbors.push(data[leftIndex] + data[leftIndex+1] + data[leftIndex+2]);
            }
            if (x < width - 1) {
                const rightIndex = (y * width + (x+1)) * 4;
                neighbors.push(data[rightIndex] + data[rightIndex+1] + data[rightIndex+2]);
            }
            
            // Se algum vizinho for escuro (abaixo do threshold), este pixel está na borda
            for (let neighbor of neighbors) {
                if (neighbor < threshold) {
                    return true;
                }
            }
            
            return false;
        }
        
        // ======================
        // CARREGAR IMAGEM
        // ======================
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = "./atena.png";
        
        img.onload = () => {
            console.log("Imagem carregada, detectando bordas...");
            
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;
            
            const positions = [];
            const step = 2;  // Mais fino para pegar bem o contorno
            
            let bordasEncontradas = 0;
            
            for (let y = 0; y < img.height; y += step) {
                for (let x = 0; x < img.width; x += step) {
                    if (isEdge(data, x, y, img.width, img.height, 80)) {
                        const px = (x / img.width) * 4.5 - 2.25;
                        const py = 2.2 - (y / img.height) * 3.8;
                        const pz = (Math.random() - 0.5) * 0.15;  // profundidade pequena
                        positions.push(px, py, pz);
                        bordasEncontradas++;
                    }
                }
            }
            
            console.log(`${bordasEncontradas} pontos de contorno gerados`);
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x3399ff,
                size: 0.045,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });
            
            const hologram = new THREE.Points(geometry, material);
            scene.add(hologram);
            
            // Partículas flutuantes ao redor
            const floatingCount = 800;
            const floatingPos = [];
            for (let i = 0; i < floatingCount; i++) {
                floatingPos.push((Math.random() - 0.5) * 6);
                floatingPos.push((Math.random() - 0.5) * 4 + 0.5);
                floatingPos.push((Math.random() - 0.5) * 4);
            }
            const floatingGeo = new THREE.BufferGeometry();
            floatingGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(floatingPos), 3));
            const floatingMat = new THREE.PointsMaterial({
                color: 0x66ccff,
                size: 0.02,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending
            });
            const floatingPoints = new THREE.Points(floatingGeo, floatingMat);
            scene.add(floatingPoints);
            
            // Animação
            let time = 0;
            
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;
                
                hologram.rotation.y = Math.sin(time * 0.15) * 0.1;
                hologram.position.y = Math.sin(time * 0.8) * 0.02;
                
                floatingPoints.rotation.y += 0.001;
                floatingPoints.rotation.x = Math.sin(time * 0.1) * 0.05;
                
                controls.update();
                renderer.render(scene, camera);
            }
            
            animate();
        };
        
        img.onerror = () => {
            // Fallback: contorno de silhueta feminina
            const positions = [];
            
            // Contorno da cabeça
            for (let i = 0; i < 360; i += 6) {
                const rad = i * Math.PI / 180;
                positions.push(Math.cos(rad) * 0.42, 1.8 + Math.sin(rad) * 0.52, 0);
            }
            
            // Contorno do corpo (lados esquerdo e direito)
            for (let y = 0.2; y <= 1.6; y += 0.05) {
                let width = 0.35;
                if (y > 1.2) width = 0.42;
                if (y < 0.5) width = 0.38;
                positions.push(-width, y, 0);
                positions.push(width, y, 0);
            }
            
            // Contorno dos ombros
            for (let x = -0.55; x <= 0.55; x += 0.05) {
                positions.push(x, 1.55, 0);
            }
            
            // Contorno dos braços
            for (let y = 0.9; y <= 1.5; y += 0.06) {
                positions.push(-0.58, y, 0);
                positions.push(0.58, y, 0);
            }
            
            // Contorno do cabelo
            for (let i = 0; i < 360; i += 8) {
                const rad = i * Math.PI / 180;
                const raio = 0.55;
                positions.push(Math.cos(rad) * raio, 2.0 + Math.sin(rad) * 0.45, 0);
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x3399ff,
                size: 0.05,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            
            const hologram = new THREE.Points(geometry, material);
            scene.add(hologram);
            
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;
                hologram.rotation.y = Math.sin(time * 0.15) * 0.1;
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        };
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
