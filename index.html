<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Holograma Feminino 3D</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #02040a, #000);
}

canvas { display: block; }

.hud {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00f6ff;
  font-family: Arial;
  letter-spacing: 3px;
  opacity: 0.7;
  text-shadow: 0 0 10px #00f6ff;
}
</style>
</head>
<body>

<div class="hud">HOLOGRAMA • ENTIDADE FEMININA</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌐 Luz holográfica
const light = new THREE.PointLight(0x00f6ff, 2);
light.position.set(5, 5, 5);
scene.add(light);

// 💠 Corpo base (silhueta feminina simples)
const bodyGeometry = new THREE.CapsuleGeometry(0.8, 2.2, 8, 16);
const bodyMaterial = new THREE.MeshBasicMaterial({
  color: 0x00f6ff,
  wireframe: true,
  transparent: true,
  opacity: 0.35
});

const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
scene.add(body);

// 🧠 Cabeça holográfica
const headGeometry = new THREE.SphereGeometry(0.5, 16, 16);
const headMaterial = bodyMaterial.clone();
const head = new THREE.Mesh(headGeometry, headMaterial);
head.position.y = 1.8;
scene.add(head);

// ✨ Aura de partículas
const particlesCount = 600;
const positions = [];

for (let i = 0; i < particlesCount; i++) {
  positions.push(
    (Math.random() - 0.5) * 10,
    (Math.random() - 0.5) * 10,
    (Math.random() - 0.5) * 10
  );
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(positions, 3)
);

const particleMat = new THREE.PointsMaterial({
  color: 0x00f6ff,
  size: 0.03,
  transparent: true,
  opacity: 0.7
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// 🌊 Animação
function animate() {
  requestAnimationFrame(animate);

  const t = Date.now() * 0.001;

  // respiração
  body.scale.y = 1 + Math.sin(t) * 0.05;
  head.position.y = 1.8 + Math.sin(t) * 0.05;

  // rotação suave
  body.rotation.y += 0.003;
  head.rotation.y += 0.003;
  particles.rotation.y += 0.001;

  // flutuação geral
  scene.position.y = Math.sin(t * 0.7) * 0.2;

  renderer.render(scene, camera);
}

animate();

// 📱 responsivo
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
